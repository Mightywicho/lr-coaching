<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0b0d11; --bg2:#11141a; --card:#151921; --card2:#1a202b; --line:#232a36; --line2:#2f3845;
  --tx:#e9edf4; --tx2:#9aa5b6; --tx3:#8a96a8; --bd-input:#60707f;
  --volt:#cdf563; --volt-dim:#b7e23f; --on-volt:#161f07; --ink:#0d1015;
  --blue:#7cd0fb; --orange:#ffb45c; --red:#ff7066; --green:#52d98a; --purple:#b69cff;
  --r:14px; --r-s:10px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --font-d:'Sora',system-ui,sans-serif; --font-b:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--tx);font-family:var(--font-b);font-size:14.5px;line-height:1.5;min-height:100vh}
::selection{background:rgba(205,245,99,.25)}
h1,h2,h3,h4{font-family:var(--font-d);font-weight:700;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--tx);background:var(--bg2);border:1px solid var(--bd-input);border-radius:var(--r-s);padding:9px 12px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--volt)}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible,.btn:focus-visible,.nav-item:focus-visible,.userbtn:focus-visible{outline:2px solid var(--volt);outline-offset:2px}
input::placeholder,textarea::placeholder{color:var(--tx3)}
textarea{resize:vertical;min-height:70px}
label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin:0 0 5px;text-transform:uppercase;letter-spacing:.05em}
a{color:var(--blue);text-decoration:none}

/* ---------- scrollbar ---------- */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:13.5px;padding:9px 16px;border-radius:var(--r-s);transition:filter .15s,transform .05s;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn-p{background:var(--volt);color:var(--on-volt)}
.btn-p:hover{filter:brightness(1.07)}
.btn-g{background:var(--card2);border:1px solid var(--bd-input);color:var(--tx)}
.btn-g:hover{border-color:var(--tx3)}
.btn-d{background:rgba(255,112,102,.12);color:var(--red);border:1px solid rgba(255,112,102,.3)}
.btn-sm{padding:5px 11px;font-size:12.5px;border-radius:8px}
.btn-ic{padding:7px;border-radius:8px;line-height:0}
.btn[disabled]{opacity:.45;cursor:not-allowed}

/* ---------- layout ---------- */
#app{min-height:100vh}
.shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--line);padding:22px 14px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:0 8px 18px}
.brand-mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--volt),#8fd14f);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:800;color:var(--on-volt);font-size:15px;flex:none}
.brand-name{font-family:var(--font-d);font-weight:700;font-size:15px;line-height:1.15}
.brand-name small{display:block;font-family:var(--font-b);font-weight:500;font-size:11px;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-s);color:var(--tx2);font-weight:500;font-size:14px;transition:background .15s,color .15s;width:100%;text-align:left}
.nav-item svg{flex:none}
.nav-item:hover{background:var(--card);color:var(--tx)}
.nav-item.on{background:var(--card2);color:var(--tx);font-weight:600}
.side-foot{margin-top:auto;border-top:1px solid var(--line);padding-top:12px}
.side-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-s)}
.side-user .who{min-width:0}
.side-user .who b{display:block;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-user .who span{font-size:11.5px;color:var(--tx3)}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(11,13,17,.85);backdrop-filter:blur(8px);z-index:40}
.topbar h1{font-size:21px}
.topbar .crumb{font-size:12px;color:var(--tx3);margin-top:1px}
.top-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.content{padding:26px 28px 90px;max-width:1180px;width:100%;margin:0 auto}

/* ---------- avatar ---------- */
.ava{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--ink);flex:none}
.ava-lg{width:52px;height:52px;font-size:18px;border-radius:16px}

/* ---------- cards & grids ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.card+.card{margin-top:16px}
.card h3{font-size:16.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h3 .hint{font-family:var(--font-b);font-weight:400;font-size:12px;color:var(--tx3);margin-left:auto}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.stat .k{font-size:11.5px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.stat .v{font-family:var(--font-d);font-size:24px;font-weight:700;margin-top:4px}
.stat .v small{font-size:13px;color:var(--tx3);font-weight:500}
.stat .sub{font-size:12px;color:var(--tx3);margin-top:2px}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--tx3)}

/* ---------- athlete cards ---------- */
.ath-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:12px;transition:border-color .15s;cursor:pointer}
.ath-card:hover{border-color:var(--volt)}
.ath-head{display:flex;align-items:center;gap:12px}
.ath-head .nm b{display:block;font-family:var(--font-d);font-size:16px}
.ath-head .nm span{font-size:12px;color:var(--tx2)}
.ath-meta{display:flex;gap:14px;flex-wrap:wrap}
.ath-meta .m{font-size:12px;color:var(--tx2)}
.ath-meta .m b{display:block;color:var(--tx);font-size:13.5px;font-weight:600}

/* ---------- badges / pills ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--tx2)}
.badge.volt{background:var(--card2);border-color:var(--line2);color:var(--tx2)}
.badge.blue{background:rgba(124,208,251,.1);border-color:rgba(124,208,251,.35);color:var(--blue)}
.badge.orange{background:rgba(255,180,92,.1);border-color:rgba(255,180,92,.35);color:var(--orange)}
.badge.red{background:rgba(255,112,102,.1);border-color:rgba(255,112,102,.35);color:var(--red)}
.badge.green{background:rgba(82,217,138,.1);border-color:rgba(82,217,138,.35);color:var(--green)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--line);padding:4px;border-radius:12px;width:max-content;max-width:100%;overflow-x:auto}
.tab{padding:7px 16px;border-radius:9px;font-weight:600;font-size:13px;color:var(--tx2);white-space:nowrap}
.tab.on{background:var(--card2);color:var(--tx)}
.seg{display:inline-flex;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:3px;gap:3px}
.seg button{padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--tx2)}
.seg button.on{background:var(--line2);color:var(--tx)}

/* ---------- tables ---------- */
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r-s)}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
.tbl th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);font-weight:600;text-align:left;padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--line)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl .exname{font-weight:600}
.tbl .exnote{font-size:11.5px;color:var(--tx3);display:block;margin-top:1px}
.tbl .num{font-variant-numeric:tabular-nums}
.rowbtns{display:flex;gap:4px;justify-content:flex-end}
.rowbtns button{padding:4px 7px;border-radius:7px;color:var(--tx3);line-height:0}
.rowbtns button:hover{background:var(--card2);color:var(--tx)}

/* ---------- day block ---------- */
.dayblk{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:16px;background:var(--card)}
.dayblk-h{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--card2)}
.dayblk-h h4{font-size:14.5px}
.dayblk-h .cnt{font-size:12px;color:var(--tx3)}
.dayblk-h .sp{margin-left:auto;display:flex;gap:6px}
.dayblk .tblwrap{border:none;border-radius:0}

/* ---------- macros ---------- */
.macro-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.macro-row .t{display:flex;justify-content:space-between;font-size:13px}
.macro-row .t b{font-weight:600}
.macro-row .t span{color:var(--tx2);font-variant-numeric:tabular-nums}
.mbar{height:9px;border-radius:6px;background:var(--bg2);overflow:hidden}
.mbar i{display:block;height:100%;border-radius:6px}
.kcal-big{font-family:var(--font-d);font-size:34px;font-weight:800;line-height:1}
.kcal-big small{font-size:14px;color:var(--tx2);font-weight:500}
.mg-h{font-size:13.5px;font-weight:700;margin:4px 0 9px;color:var(--tx);letter-spacing:.2px}
.planchips{display:flex;flex-wrap:wrap;gap:8px}
.planchip{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;border:1px solid var(--line2);background:var(--card2);color:var(--tx);font-size:13px;cursor:pointer;font-weight:600}
.planchip.on{border-color:var(--tx2);box-shadow:0 0 0 1px var(--tx2) inset;color:var(--tx)}
.planchip .badge{pointer-events:none}
.refblock>summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;font-family:var(--font-d);font-weight:700;font-size:15px}
.refblock>summary::-webkit-details-marker{display:none}
.refblock>summary::before{content:'▸';color:var(--tx2);font-size:12px}
.refblock[open]>summary::before{content:'▾'}
.wlog-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.exdone{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;border:1px solid var(--line2);background:var(--card2);color:var(--tx2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.exdone.on{background:var(--green);color:var(--ink);border-color:var(--green)}
.wlog-ex.done{border-color:var(--green)}
.mcheck{display:flex;align-items:center;gap:11px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;cursor:pointer}
.mcheck:hover{border-color:var(--line2)}
.mcheck .box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:transparent}
.mcheck.on{border-color:var(--green)}
.mcheck.on .box{background:var(--green);border-color:var(--green);color:var(--ink)}
.mcheck .mt2{flex:1}

/* ---------- meals ---------- */
.meal{border:1px solid var(--line);border-radius:var(--r-s);margin-bottom:12px;overflow:hidden}
.meal-h{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card2);font-weight:600;font-size:13.5px}
.meal-h .tm{color:var(--tx3);font-weight:500;font-size:12px}
.meal-h .sp{margin-left:auto;display:flex;gap:4px}
.meal ul{list-style:none;padding:8px 14px}
.meal li{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font-size:13.5px;border-bottom:1px dashed var(--line)}
.meal li:last-child{border-bottom:none}
.meal li .q{color:var(--tx2);font-variant-numeric:tabular-nums;white-space:nowrap}

/* ---------- workout logging ---------- */
.wlog-ex{border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;overflow:hidden;background:var(--card)}
.wlog-ex-h{padding:13px 16px;background:var(--card2)}
.wlog-ex-h b{font-size:14.5px;font-family:var(--font-d)}
.wlog-ex-h .tgt{font-size:12px;color:var(--tx2);margin-top:2px}
.wlog-ex-h .last{font-size:11.5px;color:var(--tx3);margin-top:1px}
.setrow{display:grid;grid-template-columns:54px 1fr 1fr 1fr 36px;gap:8px;align-items:center;padding:7px 16px}
.setrow .sn{font-size:12px;font-weight:600;color:var(--tx3)}
.setrow input{padding:7px 10px;text-align:center;font-variant-numeric:tabular-nums}
.setrow .del{color:var(--tx3);line-height:0;padding:6px;border-radius:7px}
.setrow .del:hover{color:var(--red);background:rgba(255,112,102,.08)}
.addset{margin:4px 16px 12px;font-size:12.5px;color:var(--volt);font-weight:600;padding:5px 8px;border-radius:7px}
.addset:hover{background:rgba(205,245,99,.08)}
.sethead{display:grid;grid-template-columns:54px 1fr 1fr 1fr 36px;gap:8px;padding:8px 16px 0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);font-weight:600}

/* ---------- adherence ---------- */
.adh-pick{display:flex;gap:6px}
.adh-pick button{flex:1;padding:10px 0;border-radius:var(--r-s);border:1px solid var(--line2);background:var(--bg2);font-size:16px;transition:all .12s}
.adh-pick button.on{background:var(--card2);border-color:var(--tx3)}

/* ---------- week strip ---------- */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.wday{background:var(--card);border:1px solid var(--line);border-radius:var(--r-s);padding:10px 6px;text-align:center}
.wday.today{border-color:var(--volt)}
.wday .d{font-size:11px;text-transform:uppercase;color:var(--tx3);font-weight:600}
.wday .n{font-family:var(--font-d);font-weight:700;font-size:15px;margin:2px 0 6px}
.wday .dots{display:flex;gap:3px;justify-content:center;min-height:7px}

/* ---------- charts ---------- */
.chart-wrap{width:100%}
.chart-wrap svg{display:block;width:100%;height:auto}
.legend{display:flex;gap:14px;font-size:12px;color:var(--tx2);margin-top:8px;flex-wrap:wrap}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}

/* ---------- logs feed ---------- */
.logitem{border:1px solid var(--line);border-radius:var(--r-s);padding:13px 16px;margin-bottom:10px;background:var(--card)}
.logitem .lh{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logitem .lh b{font-size:13.5px}
.logitem .lh .dt{font-size:12px;color:var(--tx3);margin-left:auto;white-space:nowrap}
.logitem .cm{font-size:13px;color:var(--tx2);margin-top:7px;padding:9px 12px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--line2)}
.logdetail{margin-top:10px;display:none}
.logitem.open .logdetail{display:block}

/* ---------- login ---------- */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.login::before{content:'';position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(205,245,99,.13),transparent 65%);top:-180px;right:-120px;pointer-events:none}
.login::after{content:'';position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(124,208,251,.1),transparent 65%);bottom:-160px;left:-120px;pointer-events:none}
.login-box{width:100%;max-width:480px;position:relative;z-index:1}
.login-brand{text-align:center;margin-bottom:28px}
.login-brand .brand-mark{width:58px;height:58px;border-radius:17px;font-size:23px;margin:0 auto 14px}
.login-brand h1{font-size:25px}
.login-brand p{color:var(--tx2);font-size:13.5px;margin-top:5px}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
.login-card h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:12px;font-family:var(--font-b);font-weight:600}
.userbtn{display:flex;align-items:center;gap:13px;width:100%;padding:13px 14px;border:1px solid var(--line2);border-radius:12px;margin-bottom:10px;background:var(--bg2);transition:border-color .15s,background .15s;text-align:left}
.userbtn:hover{border-color:var(--volt);background:var(--card2)}
.userbtn .who b{display:block;font-size:14.5px}
.userbtn .who span{font-size:12px;color:var(--tx2)}
.userbtn .arr{margin-left:auto;color:var(--tx3)}
.login-foot{text-align:center;margin-top:18px;font-size:12px;color:var(--tx3)}
.login-foot button{color:var(--tx3);text-decoration:underline}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,7,10,.7);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;animation:fade .15s}
.modal{background:var(--card);border:1px solid var(--line2);border-radius:16px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow);animation:pop .18s}
.modal-h{display:flex;align-items:center;padding:18px 22px 0}
.modal-h h3{font-size:16px}
.modal-h .x{margin-left:auto;color:var(--tx3);padding:6px;border-radius:8px;line-height:0}
.modal-h .x:hover{background:var(--card2);color:var(--tx)}
.modal-b{padding:18px 22px 22px}
.frow{margin-bottom:14px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.frow4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:560px){.frow4{grid-template-columns:1fr 1fr}}
.modal-f{display:flex;gap:10px;justify-content:flex-end;padding:0 22px 22px}
@keyframes fade{from{opacity:0}}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(6px)}}

/* ---------- toast ---------- */
#toast-root{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--card2);border:1px solid var(--volt);color:var(--tx);padding:11px 20px;border-radius:12px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);animation:pop .2s;display:flex;gap:9px;align-items:center}
.toast svg{color:var(--volt)}

/* ---------- misc ---------- */

   Basado en el sistema de Jay Ehrenstein (Programación de Cargas; Volumen de Entrenamiento, Partes 1-4)
   y en el material de volumen de David Sifuentes (carpeta ETTO). Valores de referencia configurables. */

/* El VME y el techo aumentan con la experiencia (el principiante crece con menos). */

function landmarks(group,exp){
 const b=LANDMARKS[group];if(!b)return null;
 const m=EXP_MULT[exp]||EXP_MULT.intermedio;const r=v=>Math.round(v);
 return{vm:b.vm,vme:r(b.vme*m.vme),vma:r(b.vma*m.vma),vmr:r(b.vmr*m.vmr)};
}

/* Recomendación semanal (series directas) según grupo, experiencia, fase, bloque y prioridad. */
function volumeRec(group,exp,phase,block,priority){
 const L=landmarks(group,exp);if(!L)return null;
 block=Math.min(4,Math.max(1,block||1));
 if(priority===0)return{lo:0,hi:0,target:0,L};
 let lo,hi;const mid=(a,b)=>Math.round((a+b)/2),t=(block-1)/3;
 if(phase==='regeneracion'){lo=L.vm;hi=L.vme;}
 else if(phase==='introduccion'){if(priority===3){lo=L.vm;hi=L.vme;}else{lo=L.vme;hi=mid(L.vme,L.vma);}}
 else if(phase==='mantenimiento'){
   if(priority===4){lo=mid(L.vma,L.vmr);hi=L.vmr;}
   else if(priority===1){lo=L.vma-2;hi=L.vma;}else if(priority===2){lo=mid(L.vme,L.vma)-1;hi=L.vma-2;}else{lo=Math.max(L.vm,L.vme-2);hi=L.vme;}}
 else if(phase==='perdida'){
   if(priority===4){lo=L.vme+1;hi=L.vme+4;}
   else if(priority===1){lo=L.vme;hi=L.vme+3;}else if(priority===2){lo=L.vme;hi=L.vme+1;}else{lo=L.vm;hi=L.vme;}}
 else{ /* acumulación: sube con el bloque */
   if(priority===4){lo=Math.round(L.vma+(L.vmr-L.vma)*0.3);hi=Math.round(L.vma+(L.vmr-L.vma)*(0.6+0.4*t));}
   else if(priority===1){lo=Math.round(L.vme+(L.vma-L.vme)*0.3);hi=Math.round(L.vma+(L.vmr-L.vma)*t);}
   else if(priority===2){lo=L.vme;hi=Math.round(L.vme+(L.vma-L.vme)*(0.6+0.4*t));}
   else{lo=L.vm;hi=L.vme;}}
 if(hi<lo)hi=lo;
 return{lo,hi,target:mid(lo,hi),L};
}
/* Estado del volumen programado frente a la recomendación y al VMR. */
function volumeStatus(actual,rec,priority){
 if(priority===0)return actual>0?{cls:'orange',txt:'Programado sin prioridad'}:{cls:'',txt:'—'};
 if(actual<=0)return{cls:'red',txt:'Sin volumen'};
 if(rec.L&&actual>rec.L.vmr)return{cls:'red',txt:'Excede VMR'};
 if(actual<rec.lo)return{cls:'orange',txt:'Bajo'};
 if(actual>rec.hi)return{cls:'volt',txt:'Alto (tolerable)'};
 return{cls:'green',txt:'En rango'};
}
/* Estado del volumen programado frente al objetivo asignado por el coach. */
function targetStatus(actual,tgt,L){
 const dfx=actual-tgt;
 if(L&&actual>L.vmr)return{cls:'red',txt:'Excede VMR'};
 if(dfx<0)return{cls:'orange',txt:'Faltan '+(-dfx)+' series'};
 if(dfx===0)return{cls:'green',txt:'Objetivo cubierto'};
 return{cls:'volt',txt:'+'+dfx+' sobre objetivo'};
}

 });
}

function libByName(name){const k=String(name||'').trim().toLowerCase();return(S.library||[]).find(l=>l.name.trim().toLowerCase()===k);}
function libById(id){return(S.library||[]).find(l=>l.id===id);}
function linkRoutinesToLib(st){
  Object.keys(st.athletes).forEach(aid=>{
    st.athletes[aid].routine.days.forEach(day=>day.exercises.forEach(e=>{
      if(!e.libId){const m=(st.library||[]).find(l=>l.name.trim().toLowerCase()===String(e.name).trim().toLowerCase());if(m)e.libId=m.id;}
    }));
  });
}
function ensureLibrary(st){
  if(!st.library){st.library=libSeed();st.libVersion=2;}
  else if(st.libVersion!==2){
    /* migración v1 → v2: músculos sueltos pasan a grupo general + especialización; se conservan videos */
    const seed=libSeed();
    const inSeed=n=>seed.find(x=>x.name.trim().toLowerCase()===String(n).trim().toLowerCase());
    st.library.forEach(l=>{
      const sm=inSeed(l.name);
      if(sm){l.group=sm.group;l.cat=sm.cat;l.focus=sm.focus;l.secondary=sm.secondary.slice();l.equipment=l.equipment||sm.equipment;l.cues=l.cues||sm.cues;}
      else{
        const map=OLD2NEW[l.primary]||{};
        l.group=l.group||map.g||(GROUPS.includes(l.primary)?l.primary:GROUPS[0]);
        l.focus=l.focus||map.f||'';
        l.cat=l.cat||'';
        l.secondary=(l.secondary||[]).map(m2=>(OLD2NEW[m2]||{}).g||m2).filter((v,i,a)=>v&&v!==l.group&&GROUPS.includes(v)&&a.indexOf(v)===i);
      }
      delete l.primary;
    });
    seed.forEach(sx=>{if(!st.library.some(l=>l.name.trim().toLowerCase()===sx.name.trim().toLowerCase()))st.library.push(sx);});
    st.libVersion=2;
  }
  linkRoutinesToLib(st);
}

    if(data&&data.state){S=data.state;ensureLibrary(S);ensureProgramming(S);ensureProgression(S);ensureDailyLogs(S);ensureProfileExtras(S);ensureFoods(S);return;}

  S=seedState();ensureLibrary(S);ensureProgramming(S);ensureProgression(S);ensureDailyLogs(S);ensureProfileExtras(S);ensureFoods(S);

/* métricas derivadas */
function lastWeight(aid){const w=athData(aid).logs.weight;return w.length?w[w.length-1]:null;}
function weightDelta(aid,days){const w=athData(aid).logs.weight;if(w.length<2)return null;const cutoff=daysAgoISO(days);const base=w.filter(x=>x.date>=cutoff);if(base.length<2)return null;return +(base[base.length-1].kg-base[0].kg).toFixed(1);}
/* semanas (lunes a domingo) y promedios semanales */
const weekStartISO=iso=>{const[y,m,dd]=iso.split('-').map(Number);const dt=new Date(y,m-1,dd);dt.setDate(dt.getDate()-((dt.getDay()+6)%7));return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');};
function weeklyAvgSeries(list,field,dec){const map={};(list||[]).forEach(x=>{const wk=weekStartISO(x.date);(map[wk]=map[wk]||[]).push(+x[field]);});return Object.keys(map).sort().map(wk=>{const v=map[wk];return{week:wk,avg:+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(dec),n:v.length};});}
function weightWeekly(aid){const s=weeklyAvgSeries(athData(aid).logs.weight,'kg',2);s.forEach((w,i)=>{if(i>0){w.delta=+(w.avg-s[i-1].avg).toFixed(2);w.pct=+(w.delta/s[i-1].avg*100).toFixed(2);}else{w.delta=null;w.pct=null;}});return s;}
function stepsWeekly(aid){return weeklyAvgSeries(athData(aid).logs.steps,'steps',0);}
/* ritmo semanal fiable: compara las 2 últimas semanas con un mínimo de pesajes */
function weeklyRate(aid,minN){minN=minN||3;const s=weightWeekly(aid).filter(w=>w.n>=minN);if(s.length<2)return null;const a=s[s.length-2],b=s[s.length-1];return{delta:+(b.avg-a.avg).toFixed(2),pct:+((b.avg-a.avg)/a.avg*100).toFixed(2),from:a.week,to:b.week};}
function lastSteps(aid){const s=athData(aid).logs.steps||[];return s.length?s[s.length-1]:null;}
function ensureDailyLogs(st){Object.keys(st.athletes||{}).forEach(aid=>{const l=st.athletes[aid].logs;if(l&&!l.steps)l.steps=[];if(l&&!l.meals)l.meals=[];});}
/* perfil ampliado: modo de asesoría + perfil de entrenamiento (lesiones / preferencias de ejercicios) */
function ensureProfileExtras(st){Object.keys(st.athletes||{}).forEach(aid=>{const p=st.athletes[aid].profile;if(!p)return;if(!p.service)p.service='ambos';if(!p.training||typeof p.training!=='object')p.training={injuries:'',dislikes:'',likes:''};['injuries','dislikes','likes'].forEach(k=>{if(p.training[k]==null)p.training[k]='';});const n=st.athletes[aid].nutrition;if(n){if(!n.dietProfile||typeof n.dietProfile!=='object')n.dietProfile={likes:'',dislikes:'',allergies:'',intolerances:'',notes:''};['likes','dislikes','allergies','intolerances','notes'].forEach(k=>{if(n.dietProfile[k]==null)n.dietProfile[k]='';});}});}
/* ingesta de hoy a partir de las comidas registradas */
function mealKcal(m){return Math.round((m.p||0)*4+(m.c||0)*4+(m.f||0)*9);}
function intakeForDate(aid,iso){const t={p:0,c:0,f:0,kcal:0};(athData(aid).logs.meals||[]).filter(m=>m.date===iso).forEach(m=>{t.p+=m.p||0;t.c+=m.c||0;t.f+=m.f||0;});t.p=+t.p.toFixed(1);t.c=+t.c.toFixed(1);t.f=+t.f.toFixed(1);t.kcal=Math.round(t.p*4+t.c*4+t.f*9);return t;}

/* ===== modelo de nutrición: varios PLANES por tipo de día (pesado/normal/off/recarga) ===== */
const PLAN_TYPES={normal:{lbl:'Día normal',cls:'volt'},heavy:{lbl:'Día pesado',cls:'blue'},off:{lbl:'Day off',cls:'orange'},refeed:{lbl:'Recarga',cls:'green'},custom:{lbl:'Personalizado',cls:''}};
function planType(t){return PLAN_TYPES[t]||PLAN_TYPES.custom;}
function foodMacros(name,g){const fo=(S.foods||[]).find(x=>x.name.toLowerCase()===(name||'').toLowerCase());if(!fo)return null;const k=g/100;return{p:+(fo.p*k).toFixed(1),c:+(fo.c*k).toFixed(1),f:+(fo.f*k).toFixed(1)};}
function normMeal(m){m.items=(m.items||[]).map(it=>{let p=+it.p||0,c=+it.c||0,f=+it.f||0,grams=+it.grams||0;if(!p&&!c&&!f){const gm=/([\d.]+)\s*g/i.exec(it.qty||'');if(gm){const g=parseFloat(gm[1]);const mac=foodMacros(it.food,g);if(mac){p=mac.p;c=mac.c;f=mac.f;grams=g;}}}return{food:it.food,qty:it.qty||'',grams,p,c,f};});return m;}
function migrateNutrition(n){
  if(!n)return{plans:[],activePlan:null,supplements:[]};
  if(!n.plans){
    const id=uid();
    n.plans=[{id,name:'Día normal',type:'normal',mode:n.mode||'macros',kcal:n.kcal||0,protein:n.protein||0,carbs:n.carbs||0,fat:n.fat||0,mealsPerDay:n.mealsPerDay||4,meals:(n.meals||[]).map(normMeal),notes:n.notes||''}];
    n.activePlan=id;
  } else { n.plans.forEach(p=>{p.meals=(p.meals||[]).map(normMeal);}); }
  if(!Array.isArray(n.supplements))n.supplements=[];
  if(!n.dietProfile||typeof n.dietProfile!=='object')n.dietProfile={likes:'',dislikes:'',allergies:'',intolerances:'',notes:''};
  ['likes','dislikes','allergies','intolerances','notes'].forEach(k=>{if(n.dietProfile[k]==null)n.dietProfile[k]='';});
  if(!n.activePlan||!n.plans.find(p=>p.id===n.activePlan))n.activePlan=n.plans[0]?n.plans[0].id:null;
  return n;
}
function nutriOf(aid){return migrateNutrition(athData(aid).nutrition);}
function activePlanOf(aid){const n=nutriOf(aid);return n.plans.find(p=>p.id===n.activePlan)||n.plans[0];}
function athPlanOf(aid){const n=nutriOf(aid),d=athData(aid);return (d.nutriPick&&n.plans.find(p=>p.id===d.nutriPick))||activePlanOf(aid);}
function mealItemsTotals(m){const t={p:0,c:0,f:0};(m.items||[]).forEach(it=>{t.p+=it.p||0;t.c+=it.c||0;t.f+=it.f||0;});t.p=+t.p.toFixed(1);t.c=+t.c.toFixed(1);t.f=+t.f.toFixed(1);t.kcal=Math.round(t.p*4+t.c*4+t.f*9);return t;}
function planMenuTotals(p){const t={p:0,c:0,f:0};(p.meals||[]).forEach(m=>{(m.items||[]).forEach(it=>{t.p+=it.p||0;t.c+=it.c||0;t.f+=it.f||0;});});t.p=+t.p.toFixed(1);t.c=+t.c.toFixed(1);t.f=+t.f.toFixed(1);t.kcal=Math.round(t.p*4+t.c*4+t.f*9);return t;}
/* registro diario de nutrición del atleta: comidas del plan seguidas → adherencia automática */
function todayNutriEntry(aid){const d=athData(aid),t=todayISO();let e=d.logs.nutrition.find(x=>x.date===t);if(!e){e={date:t,adherence:null,comment:'',mealsDone:[],planFollowed:null};d.logs.nutrition.push(e);d.logs.nutrition.sort((a,b)=>a.date<b.date?-1:1);}return e;}
function recomputeAdherence(aid){const e=todayNutriEntry(aid),p=athPlanOf(aid);
  if((p.meals||[]).length){const total=p.meals.length,done=(e.mealsDone||[]).filter(id=>p.meals.some(m=>m.id===id)).length;e.adherence=Math.max(1,Math.round(done/total*5));}
  else{const N=Math.max(1,p.mealsPerDay||1),slots=(e.mealsDone||[]).filter(id=>/^slot/.test(id)).length;if(slots>0)e.adherence=Math.max(1,Math.round(slots/N*5));else e.adherence=e.planFollowed===true?5:e.planFollowed===false?2:3;}
  return e;}
/* macros de una comida: desde sus alimentos (menú) o desde sus macros directos (modo macros) */
function mealMacros(m){if((m.items||[]).length)return mealItemsTotals(m);const p=+m.p||0,c=+m.c||0,f=+m.f||0;return{p:+p.toFixed(1),c:+c.toFixed(1),f:+f.toFixed(1),kcal:Math.round(p*4+c*4+f*9)};}
/* ===== macros consumidos hoy = comidas del plan marcadas + alimentos libres registrados ===== */
function planMealShare(p){const n=Math.max(1,p.mealsPerDay||1);return{p:+((p.protein||0)/n).toFixed(1),c:+((p.carbs||0)/n).toFixed(1),f:+((p.fat||0)/n).toFixed(1),n};}
function doneMealsMacros(aid){const p=athPlanOf(aid),e=todayNutriEntry(aid),done=e.mealsDone||[],t={p:0,c:0,f:0};
  if((p.meals||[]).length){p.meals.forEach(m=>{if(done.indexOf(m.id)>=0){const mt=mealMacros(m);t.p+=mt.p;t.c+=mt.c;t.f+=mt.f;}});}
  else{const sh=planMealShare(p),k=done.filter(id=>/^slot/.test(id)).length;t.p=sh.p*k;t.c=sh.c*k;t.f=sh.f*k;}
  t.p=+t.p.toFixed(1);t.c=+t.c.toFixed(1);t.f=+t.f.toFixed(1);t.kcal=Math.round(t.p*4+t.c*4+t.f*9);return t;}
function consumedToday(aid){const a=doneMealsMacros(aid),b=intakeForDate(aid,todayISO());const t={p:+(a.p+b.p).toFixed(1),c:+(a.c+b.c).toFixed(1),f:+(a.f+b.f).toFixed(1)};t.kcal=Math.round(t.p*4+t.c*4+t.f*9);return t;}

function rmrEquations(W,H,A,sex,FFM){
  const Hm=H/100,sM=(sex==='M'),e={};
  if(W>0&&H>0&&A>0){
    e.mifflin={name:'Mifflin-St Jeor (1990)',val:10*W+6.25*H-5*A+(sM?5:-161),need:'peso, talla, edad, sexo'};
    e.harris={name:'Harris-Benedict (1918)',val:sM?(66.473+13.7516*W+5.0033*H-6.755*A):(655.0955+9.5634*W+1.8496*H-4.6756*A),need:'peso, talla, edad, sexo'};
    e.tenhaaf={name:'Ten-Haaf (2014) · peso·talla·edad',val:11.936*W+587.728*Hm-8.129*A+191.027*(sM?1:0)+29.279,need:'peso, talla, edad, sexo'};
    e.delorenzo={name:'De Lorenzo (1999)',val:9*W+11.7*H-857,need:'peso, talla'};
  }
  if(FFM>0){
    e.cunningham={name:'Cunningham (1980) · MLG',val:500+22*FFM,ffm:true,need:'masa libre de grasa'};
    e.katch={name:'Katch-McArdle · MLG',val:370+21.6*FFM,ffm:true,need:'masa libre de grasa'};
    e.tenhaaf_ffm={name:'Ten-Haaf (2014) · MLG',val:22.771*FFM+484.264,ffm:true,need:'masa libre de grasa'};
  }
  Object.keys(e).forEach(k=>e[k].val=Math.round(e[k].val));
  return e;
}

function metTDEE(W,buckets){let kcal=0,h=0;buckets.forEach(b=>{kcal+=(b.met||0)*W*(b.h||0);h+=(b.h||0);});return{kcal:Math.round(kcal),hours:+h.toFixed(1)};}
const KCAL_PER_KG=7700; /* equivalente energético aprox. de 1 kg de peso corporal */
function workoutsInLast(aid,days){const cutoff=daysAgoISO(days);return athData(aid).logs.workouts.filter(w=>w.date>=cutoff).length;}
function adherenceAvg(aid,days){const cutoff=daysAgoISO(days);const l=athData(aid).logs.nutrition.filter(n=>n.date>=cutoff);if(!l.length)return null;return +(l.reduce((a,b)=>a+b.adherence,0)/l.length).toFixed(1);}

/* estado del ciclo de asesoría (membresía) */
function athStatus(aid){

function exHistory(aid,exId){const out=[];athData(aid).logs.workouts.forEach(w=>{const sets=(w.entries||{})[exId];if(sets&&sets.length){const best=Math.max(...sets.map(s=>+s.w||0));const reps=sets.find(s=>(+s.w||0)===best);out.push({date:w.date,best,reps:reps?reps.r:'',sets});}});return out;}

/* ===== RENDIMIENTO Y CARGA: 1RM estimado · comparación de sesiones · ACWR ===== */
/* 1RM estimado: Epley y Brzycki promediadas. Reps efectivas = reps + RIR (proximidad al fallo). */
function e1rmEpley(w,r){return w*(1+r/30);}
function e1rmBrzycki(w,r){return r<37?w*36/(37-r):0;}
function e1rm(w,r,rir,useRir){
  w=+w||0;r=+r||0;const hasRir=(rir!=null&&rir!=='');rir=hasRir?(+rir||0):0;
  const eff=(useRir&&hasRir)?r+rir:r;
  if(w<=0||eff<=0)return 0;
  if(eff<=1)return Math.round(w*10)/10;
  const ep=e1rmEpley(w,eff),bz=e1rmBrzycki(w,eff);
  return Math.round((bz>0?(ep+bz)/2:ep)*10)/10;
}
function bestSetE1RM(sets){let best=0,which=null;(sets||[]).forEach(s=>{const v=e1rm(s.w,s.r,s.rir,true);if(v>best){best=v;which=s;}});return{e1rm:best,set:which};}
function e1rmHistory(aid,exId){const out=[];athData(aid).logs.workouts.forEach(w=>{const ss=(w.entries||{})[exId];if(ss&&ss.length){const b=bestSetE1RM(ss);if(b.e1rm>0)out.push({date:w.date,e1rm:b.e1rm,set:b.set,sets:ss});}});return out;}
function topSetOf(sets){let best=null;(sets||[]).forEach(s=>{if(!best||(+s.w||0)>(+best.w||0))best=s;});return best;}
function exTonnage(sets){let t=0;(sets||[]).forEach(s=>{t+=(+s.w||0)*(+s.r||0);});return t;}
function exNameOf(d,exId){let nm='Ejercicio';d.routine.days.forEach(day=>{const f=day.exercises.find(e=>e.id===exId);if(f)nm=f.name;});return nm;}
/* serie completa de un ejercicio (todo el historial) con calidad (reps/RIR del top set) y PRs acumulados */
function exSeries(aid,exId){
  const out=[];athData(aid).logs.workouts.slice().sort((a,b)=>a.date<b.date?-1:1).forEach(w=>{
    const ss=(w.entries||{})[exId];if(!ss||!ss.length)return;
    const b=bestSetE1RM(ss),t=topSetOf(ss)||{};if(b.e1rm<=0)return;
    out.push({date:w.date,wid:w.id,dayId:w.dayId,e1rm:b.e1rm,topW:+t.w||0,topR:+t.r||0,topRir:(t.rir!=null&&t.rir!=='')?+t.rir:null,ton:Math.round(exTonnage(ss)),sets:ss.length});
  });
  let mE=0,mW=0,mT=0;
  out.forEach(o=>{o.prE1=o.e1rm>mE+0.001;o.prW=o.topW>mW+0.001;o.prTon=o.ton>mT+0.001;if(o.e1rm>mE)mE=o.e1rm;if(o.topW>mW)mW=o.topW;if(o.ton>mT)mT=o.ton;o.pr=o.prE1||o.prW||o.prTon;});
  return out;
}
/* estado de progreso de un ejercicio sobre una serie (ya filtrada al rango). 1RM est. ya pondera reps+RIR */
function exStatus(series){
  if(!series.length)return null;
  const n=series.length,last=series[n-1];
  if(last.prE1)return{k:'pr',cls:'volt',lbl:'🏆 Récord de 1RM estimado',detail:'Nuevo máximo: '+last.e1rm+' kg (mejor serie '+last.topW+'×'+last.topR+(last.topRir!=null?' @RIR '+last.topRir:'')+').'};
  if(n<2)return{k:'inicio',cls:'',lbl:'Primera medición del rango',detail:'Aún sin sesión previa para comparar.'};
  const prev=series[n-2],de=Math.round((last.e1rm-prev.e1rm)*10)/10;
  if(de>0){
    if(last.topW<=prev.topW)return{k:'calidad',cls:'green',lbl:'Progresa por calidad',detail:'Mismo peso o menos pero mejores reps/RIR: 1RM est. +'+de+' kg ('+prev.topW+'×'+prev.topR+(prev.topRir!=null?'@'+prev.topRir:'')+' → '+last.topW+'×'+last.topR+(last.topRir!=null?'@'+last.topRir:'')+').'};
    return{k:'progresa',cls:'green',lbl:'Progresando',detail:'1RM est. +'+de+' kg vs sesión anterior.'};
  }
  const w3=series.slice(-3),flat=w3.length>=3&&Math.abs(w3[2].e1rm-w3[0].e1rm)/(w3[0].e1rm||1)<0.01;
  if(de<0)return{k:'regresion',cls:'red',lbl:'Regresión',detail:'1RM est. '+de+' kg vs anterior. Revisa fatiga, técnica o sueño.'};
  if(flat)return{k:'estancado',cls:'orange',lbl:'Estancado',detail:'Sin avance de 1RM (peso, reps ni RIR) en las últimas 3 sesiones. Considera variar carga/reps o intensificar.'};
  return{k:'manten',cls:'',lbl:'Sostenido',detail:'1RM est. estable vs anterior.'};
}

function fatigueForDate(aid,iso){let best=null,bd=7;fatigueLogs(aid).forEach(e=>{const dd=Math.abs(daysBetweenISO(e.date,iso));if(dd<=6&&dd<bd){bd=dd;best=e;}});return best;}
/* bloque y semana-dentro-del-bloque a los que pertenece una fecha (para comparar entre bloques) */
function blockInfoForDate(aid,iso){
  const r=athData(aid).routine,p=athData(aid).profile;let info=null;
  (r.history||[]).forEach(h=>{if(h.startDate&&h.endDate&&iso>=h.startDate&&iso<=h.endDate)info={block:h.block,start:h.startDate};});
  if(!info)info={block:p.block||1,start:r.startDate||iso};

/* carga de sesión: interna (sRPE = RPE×min) y externa (tonelaje = Σ peso×reps) */
function sessTonnage(w){let t=0;Object.values(w.entries||{}).forEach(ss=>ss.forEach(s=>{t+=(+s.w||0)*(+s.r||0);}));return t;}
function sessSRPE(w){return(+w.rpe||0)*(+w.dur||0);}
function sessLoad(w,metric){return metric==='tonnage'?sessTonnage(w):sessSRPE(w);}
/* ACWR acoplada: carga aguda (7d) ÷ carga crónica (media semanal de 28d) */
function acwrData(aid,metric){
  const today=todayISO(),ws=athData(aid).logs.workouts;
  let acute=0,chronic=0,nA=0,nC=0,oldest=0;
  ws.forEach(w=>{const age=daysBetweenISO(w.date,today);if(age<0)return;const L=sessLoad(w,metric);if(age<7){acute+=L;nA++;}if(age<28){chronic+=L;nC++;}if(age>oldest)oldest=age;});
  const chronicWk=chronic/4,ratio=chronicWk>0?acute/chronicWk:null;
  return{acute:Math.round(acute),chronicWk:Math.round(chronicWk),ratio,nA,nC,daysSpan:Math.min(oldest+1,28)};
}
function acwrZone(r){
  if(r==null)return{cls:'',lbl:'Sin base suficiente',msg:'No hay carga crónica calculable. Registra sesiones con RPE y duración durante ~3-4 semanas para obtener un ratio fiable.'};
  if(r<0.8)return{cls:'blue',lbl:'Infracarga',msg:'La carga aguda está por debajo de la crónica: descarga o desentrenamiento. Si no es intencionado, hay margen para progresar con seguridad.'};
  if(r<=1.3)return{cls:'green',lbl:'Óptimo',msg:'Zona de buena gestión de carga (sweet spot 0,8–1,3). Mantén la progresión gradual.'};
  if(r<=1.5)return{cls:'orange',lbl:'Exceso — precaución',msg:'Pico de carga moderado (1,3–1,5). No subas volumen ni intensidad esta semana; vigila sueño, dolor muscular y RPE.'};
  return{cls:'red',lbl:'Riesgo alto de lesión',msg:'Carga aguda muy por encima de la crónica (>1,5). Reduce volumen/intensidad o intercala una descarga; cruza con el check-in de fatiga antes de seguir.'};
}
function loadWeekly(aid,metric,nWeeks){
  const today=todayISO(),ws=athData(aid).logs.workouts,buckets={};
  ws.forEach(w=>{const age=daysBetweenISO(w.date,today);if(age<0)return;const b=Math.floor(age/7);if(b<nWeeks)buckets[b]=(buckets[b]||0)+sessLoad(w,metric);});
  const out=[];for(let b=nWeeks-1;b>=0;b--)out.push({x:daysAgoISO(b*7+6),y:Math.round(buckets[b]||0)});

}

function svgLine(points,opts){

  if(!points||points.length<2)return'<div class="empty"><b>Aún no hay suficientes datos</b>Se necesitan al menos 2 registros para la gráfica.</div>';
  const ys=points.map(p=>p.y);let min=Math.min(...ys),max=Math.max(...ys);if(max-min<1){max+=.5;min-=.5;}
  const span=max-min,iw=W-padL-padR,ih=H-padT-padB;
  const X=i=>padL+(points.length===1?iw/2:i/(points.length-1)*iw);
  const Y=v=>padT+ih-((v-min)/span*ih);
  let path='',area='M'+X(0)+','+(padT+ih);
  points.forEach((p,i)=>{const x=X(i),y=Y(p.y);path+=(i?'L':'M')+x.toFixed(1)+','+y.toFixed(1);area+='L'+x.toFixed(1)+','+y.toFixed(1);});
  area+='L'+X(points.length-1)+','+(padT+ih)+'Z';

  for(let i=0;i<=2;i++){const v=min+span*i/2,y=Y(v);grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#232a36" stroke-width="1"/>';labels+='<text x="'+(padL-7)+'" y="'+(y+4)+'" text-anchor="end" font-size="10.5" fill="#8a96a8">'+(span>20?Math.round(v):v.toFixed(1))+'</text>';}

  let dots='';points.forEach((p,i)=>{dots+='<circle cx="'+X(i)+'" cy="'+Y(p.y)+'" r="3.2" fill="#11141a" stroke="'+color+'" stroke-width="2"/>';});

}
function macroBars(n,big){
  const kcal=n.kcal||kcalFromMacros(n);
  const rows=[['Proteína',n.protein,'g','#7cd0fb',n.protein*4],['Carbohidratos',n.carbs,'g','#cdf563',n.carbs*4],['Grasas',n.fat,'g','#ffb45c',n.fat*9]];
  let html=big?'<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:18px"><span class="kcal-big">'+kcal+'</span><small style="color:var(--tx2)">kcal / día</small></div>':'';
  rows.forEach(r=>{const pct=Math.min(100,Math.round(r[4]/kcal*100));
    html+='<div class="macro-row"><div class="t"><b>'+r[0]+'</b><span>'+r[1]+' '+r[2]+' · '+pct+'%</span></div><div class="mbar"><i style="width:'+pct+'%;background:'+r[3]+'"></i></div></div>';});
  return html;
}

/* pestañas visibles según el modo de asesoría del atleta */
function coachTabList(aid){
  const sv=svcOf(aid);
  return [['resumen','Resumen',1],['progreso','Progreso','tr'],['rendimiento','Rendimiento','tr'],['rutina','Rutina','tr'],['volumen','Volumen y fase','tr'],['semanas','Semana a semana','tr'],['nutricion','Nutrición','nu'],['registros','Registros',1]]
    .filter(t=>t[2]===1||(t[2]==='tr'&&sv.tr)||(t[2]==='nu'&&sv.nu));
}
function coachTabs(aid,tab){
  const tabs=coachTabList(aid);
  const sv=svcOf(aid);
  let h='<div class="tabs mb16">';
  tabs.forEach(t=>{h+='<button class="tab'+(tab===t[0]?' on':'')+'" data-act="nav" data-view="coach-ath" data-params=\'{"aid":"'+aid+'","tab":"'+t[0]+'"}\'>'+t[1]+'</button>';});
  h+='<span class="badge '+sv.cls+'" style="margin-left:auto;align-self:center" title="Modo de asesoría — cámbialo en Resumen">'+sv.short+'</span>';
  return h+'</div>';
}

VIEWS['coach-ath']=function(u){
  const aid=route.params.aid;let tab=route.params.tab||'resumen';
  const a=userById(aid),d=athData(aid);
  if(!a||!d)return VIEWS['coach-dash'](u);
  if(!coachTabList(aid).some(t=>t[0]===tab))tab='resumen';
  let body=coachTabs(aid,tab);
  if(tab==='resumen')body+=coachTabResumen(aid);
  else if(tab==='progreso')body+=coachTabProgreso(aid);
  else if(tab==='rendimiento')body+=coachTabRendimiento(aid);
  else if(tab==='rutina')body+=coachTabRutina(aid);
  else if(tab==='volumen')body+=coachTabVolumen(aid);
  else if(tab==='semanas')body+=coachTabSemanas(aid);
  else if(tab==='nutricion')body+=coachTabNutri(aid);
  else body+=coachTabRegistros(aid);
  return{title:esc(a.name),crumb:esc(d.profile.category)+' · '+esc(d.profile.goal),back:{v:'coach-dash'},body};
};

function coachTabResumen(aid){
  const d=athData(aid),lw=lastWeight(aid),d30=weightDelta(aid,30),adh=adherenceAvg(aid,7),sv=svcOf(aid),tr=d.profile.training||{};
  const pts=d.logs.weight.map(w=>({x:w.date,y:w.kg}));
  let feed='';
  const comments=[];
  d.logs.workouts.forEach(w=>{if(w.comment)comments.push({date:w.date,tag:w.dayName,tagCls:'volt',txt:w.comment,extra:'RPE '+(w.rpe||'—')});});
  d.logs.nutrition.forEach(n=>{if(n.comment)comments.push({date:n.date,tag:'Nutrición',tagCls:'orange',txt:n.comment,extra:n.adherence+' / 5'});});
  comments.sort((x,y)=>y.date<x.date?-1:1).slice(0,6).forEach(c=>{
    feed+='<div class="logitem"><div class="lh"><span class="badge '+c.tagCls+'">'+esc(c.tag)+'</span><b>'+esc(c.extra)+'</b><span class="dt">'+fmtDateFull(c.date)+'</span></div><div class="cm">'+esc(c.txt)+'</div></div>';});
  if(!feed)feed='<div class="empty"><b>Sin comentarios recientes</b>Aquí verás lo que el atleta comenta en sus entrenos y comidas.</div>';
  return '<div class="grid g4 mb16">'+

function coachTabRutina(aid){

    });

    /* cobertura del plan de la sesión: programado vs planificado por grupo */
    const progG={};day.exercises.forEach(e=>{const l=e.libId?libById(e.libId):null;if(l)progG[l.group]=(progG[l.group]||0)+(parseInt(e.sets,10)||0);});
    const planG=day.plan||{};
    let pchips='';
    GROUPS.filter(g=>planG[g]||progG[g]).forEach(g=>{
      const pl=planG[g]||0,pr=progG[g]||0;
      if(pl){const cls=pr>pl?'volt':pr===pl?'green':'orange';pchips+='<span class="chip '+cls+'" title="Plan de la sesión: '+pl+' series · programadas: '+pr+(pr<pl?' — faltan '+(pl-pr):pr>pl?' — sobran '+(pr-pl):' — cubierto')+'">'+esc(g)+' '+pr+'/'+pl+'</span>';}
      else pchips+='<span class="chip" style="opacity:.55" title="Programado sin plan de sesión ('+pr+' series)">'+esc(g)+' '+pr+'</span>';
    });
    if(pchips)pchips='<span class="muschips" style="margin:0 6px">'+pchips+'</span>';
    days+='<div class="dayblk"><div class="dayblk-h" style="flex-wrap:wrap"><h4>'+esc(day.name)+'</h4><span class="cnt">'+day.exercises.length+' ejercicios</span>'+pchips+'<span class="sp"><button class="btn btn-g btn-sm" data-act="day-ren-modal" data-aid="'+aid+'" data-day="'+day.id+'">'+I.edit+' Renombrar</button><button class="btn btn-g btn-sm" data-act="day-del-ask" data-aid="'+aid+'" data-day="'+day.id+'">'+I.trash+'</button><button class="btn btn-p btn-sm" data-act="ex-add-modal" data-aid="'+aid+'" data-day="'+day.id+'">'+I.plus+' Ejercicio</button></span></div>'+
    '<div class="tblwrap"><table class="tbl"><thead><tr><th style="width:30px">#</th><th>Ejercicio</th><th style="width:60px">Series</th><th style="width:70px">Reps</th><th style="width:55px">RIR</th><th style="width:80px">Descanso</th><th style="width:130px"></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  });
  const vol=muscleVolume(aid),cov=catCoverage(aid);
  const pr=d.profile;
  let volHTML='';
  if(vol.length){
    const maxd=Math.max(...vol.map(v=>v.d),1);
    let rows2='';vol.forEach(v=>{
      const prio=pr.priorities[v.m],rec=volumeRec(v.m,pr.experience,pr.phase,pr.block,prio),L=rec?rec.L:null;
      const tgt=(pr.volTargets||{})[v.m],hasTgt=tgt!=null&&tgt!=='';
      let st=null;
      if(rec&&prio!==0&&hasTgt)st=targetStatus(v.d,+tgt,L);
      else if(rec)st=volumeStatus(v.d,rec,prio);
      const recTxt=rec&&prio!==0?'<span class="tiny" style="white-space:nowrap"> · rec '+rec.lo+'–'+rec.hi+(hasTgt?' · obj '+tgt:'')+'</span>':'';
      const stB=st&&st.cls?' <span class="dot" style="background:var(--'+(st.cls==='volt'?'volt':st.cls)+')" title="'+esc(st.txt)+'"></span>':'';
      let bar;
      if(rec&&prio!==0&&L){
        const scale=Math.max(L.vmr,rec.hi,v.d,hasTgt?+tgt:0,1);
        const left=Math.round(rec.lo/scale*100),w=Math.max(2,Math.round((rec.hi-rec.lo)/scale*100)),ax=Math.min(100,Math.round(v.d/scale*100));
        bar='<div class="volbar" title="VME '+L.vme+' · VMA '+L.vma+' · VMR '+L.vmr+' · programado '+v.d+'"><span class="rng" style="left:'+left+'%;width:'+w+'%"></span><span class="act" style="left:'+ax+'%"></span></div>';
      } else bar='<span class="mb"><i style="width:'+Math.max(4,Math.round(v.d/maxd*100))+'%"></i></span>';
      rows2+='<div class="musrow"><span class="mn">'+esc(v.m)+'</span>'+bar+'<span class="mv">'+v.d+(v.i?' <small>+'+v.i+' ind.</small>':'')+recTxt+stB+'</span></div>';});
    let covRows='';
    cov.forEach(cv=>{
      let chips='';
      cv.defined.forEach(ct=>{const s=cv.cats[ct.c]||0;chips+='<span class="chip '+(s?'cat':'dim')+'" title="'+esc(ct.p)+' · Cargas '+esc(ct.l)+'">'+ct.c+(s?' · '+s+' s':'')+'</span>';});
      Object.keys(cv.focus).forEach(f=>{chips+='<span class="chip" style="border-style:dashed" title="Especialización programada">→ '+esc(f)+' · '+cv.focus[f]+' s</span>';});
      covRows+='<div class="covrow"><span class="gn">'+esc(cv.g)+'</span>'+chips+'</div>';
    });
    volHTML='<div class="grid g2 mb16"><div class="card" style="margin:0"><h3>Volumen semanal por grupo <span class="hint">series directas · «ind.» = secundario · «rec» = recomendado</span></h3>'+rows2+'<p class="tiny mt8">El recomendado depende de la experiencia, fase y prioridades. Edítalas en <a data-act="nav" data-view="coach-ath" data-params=\'{"aid":"'+aid+'","tab":"volumen"}\' style="cursor:pointer">Volumen y fase →</a></p></div>'+
    '<div class="card" style="margin:0"><h3>Cobertura de categorías <span class="hint">cada una es una pieza del rompecabezas</span></h3>'+(covRows||'<div class="empty"><b>Sin categorías aún</b>Vincula ejercicios de la biblioteca para ver qué patrones cubre el programa.</div>')+'<p class="tiny mt8">Las apagadas son patrones del modelo aún sin trabajar en este programa. Pasa el cursor para ver el patrón y las cargas recomendadas.</p></div></div>';
  }else volHTML='<div class="card mb16"><h3>Volumen y cobertura por grupo muscular</h3><div class="empty"><b>Sin ejercicios vinculados</b>Vincula los ejercicios de la rutina con tu biblioteca para ver series por grupo y cobertura de categorías.</div></div>';
  return '<div class="card mb16"><h3>Programa actual</h3><div class="frow2"><div><label>Nombre del programa</label><input id="r_name" value="'+esc(r.name)+'"></div><div><label>Indicación de la semana</label><input id="r_week" value="'+esc(r.weekNote)+'"></div></div>'+
  '<div style="text-align:right"><button class="btn btn-p" data-act="routine-meta-save" data-aid="'+aid+'">Guardar</button></div></div>'+volHTML+days+
  '<button class="btn btn-g" data-act="day-add-modal" data-aid="'+aid+'">'+I.plus+' Añadir día de entrenamiento</button>';
}

function coachTabVolumen(aid){
  const d=athData(aid),p=d.profile,exp=p.experience,phase=p.phase,block=p.block;
  const vol=muscleVolume(aid);
  const directOf=g=>{const v=vol.find(x=>x.m===g);return v?v.d:0;};
  const freqOf=g=>{let n=0;d.routine.days.forEach(day=>{if(day.exercises.some(e=>{const l=e.libId?libById(e.libId):null;return l&&l.group===g&&(parseInt(e.sets,10)||0)>0;}))n++;});return n;};
  let eopts='';EXPERIENCES.forEach(e=>{eopts+='<option value="'+e[0]+'"'+(exp===e[0]?' selected':'')+'>'+e[1]+'</option>';});
  let popts='';PHASES.forEach(ph=>{popts+='<option value="'+ph[0]+'"'+(phase===ph[0]?' selected':'')+'>'+ph[1]+'</option>';});
  let bopts='';[1,2,3,4].forEach(b=>{bopts+='<option value="'+b+'"'+(block===b?' selected':'')+'>Bloque '+b+'</option>';});

  const ctx='<div class="card mb16"><div class="sect-h" style="margin:0 0 12px"><h3 style="margin:0">Contexto del atleta <span class="hint">determina el volumen, el RIR y las cargas recomendadas</span></h3><span class="sp"><button class="btn btn-p btn-sm" data-act="split-auto-ask" data-aid="'+aid+'" title="Genera el split completo (estructura de días + reparto de volumen + ejercicios) según los días/semana y las prioridades. Editable después.">'+I.refresh+' Generar split automático</button></span></div>'+
    '<div class="ctx-bar"><div class="fld"><label>Experiencia</label><select data-change="ctx-exp" data-aid="'+aid+'">'+eopts+'</select></div>'+
    '<div class="fld"><label>Fase actual</label><select data-change="ctx-phase" data-aid="'+aid+'">'+popts+'</select></div>'+
    '<div class="fld"><label>Bloque del período</label><select data-change="ctx-block" data-aid="'+aid+'">'+bopts+'</select></div></div>'+
    '<div class="notebox mt16">'+esc(phaseDesc(phase))+'</div>'+
    '<div class="grid g3 mt16"><div class="stat"><div class="k">RIR objetivo</div><div class="v">'+rirFor(phase,exp)+'</div><div class="sub">para esta fase y experiencia</div></div>'+
    '<div class="stat"><div class="k">Cargas P / M / L</div><div class="v" style="font-size:19px">'+loadDist(block)+'</div><div class="sub">distribución % del bloque '+block+'</div></div>'+
    '<div class="stat"><div class="k">Por sesión</div><div class="v" style="font-size:19px">6-10 <small>series/grupo</small></div><div class="sub">pico de calidad; reparte si excede</div></div></div></div>';

  /* tabla de prioridades + recomendación */
  const order={4:0,1:1,2:2,3:3,0:4};
  const rows=GROUPS.slice().sort((a,b)=>(order[p.priorities[a]]-order[p.priorities[b]])||GROUPS.indexOf(a)-GROUPS.indexOf(b));
  let trs='';
  rows.forEach(g=>{
    const prio=p.priorities[g],rec=volumeRec(g,exp,phase,block,prio),act=directOf(g),L=rec.L;
    let psel='<select class="prio-sel" data-p="'+prio+'" data-change="prio" data-aid="'+aid+'" data-group="'+esc(g)+'">';
    [4,1,2,3,0].forEach(pv=>{psel+='<option value="'+pv+'"'+(prio===pv?' selected':'')+'>'+PRIOS[pv].short+'</option>';});
    psel+='</select>';
    let recCell,bar,stCell;
    if(prio===0){recCell='<span class="tiny">—</span>';bar='';const st=volumeStatus(act,rec,prio);stCell='<span class="badge '+(st.cls||'')+'">'+st.txt+'</span>';}
    else{
      recCell='<b class="num">'+rec.lo+'–'+rec.hi+'</b> <span class="tiny">series/sem</span>';
      const scale=Math.max(L.vmr,rec.hi,act,1);
      const left=Math.round(rec.lo/scale*100),w=Math.max(2,Math.round((rec.hi-rec.lo)/scale*100)),ax=Math.min(100,Math.round(act/scale*100));
      bar='<div class="volbar" title="VME '+L.vme+' · VMA '+L.vma+' · VMR '+L.vmr+'"><span class="rng" style="left:'+left+'%;width:'+w+'%"></span><span class="act" style="left:'+ax+'%"></span></div>';
      const st=volumeStatus(act,rec,prio);stCell='<span class="badge '+(st.cls||'')+'">'+st.txt+'</span>';
    }
    const fq=freqOf(g);
    const tgt=(p.volTargets||{})[g];
    const hasTgt=tgt!=null&&tgt!=='';
    if(hasTgt&&prio!==0){const ts=targetStatus(act,+tgt,L);stCell='<span class="badge '+ts.cls+'">'+ts.txt+'</span>';}
    const tgtCell='<td><input type="number" class="vt-input" min="0" max="40" value="'+(hasTgt?tgt:'')+'" placeholder="'+(prio!==0?'rec. '+rec.target:'—')+'" title="Objetivo semanal asignado (series directas). Vacío = guiarse solo por la banda."'+(prio===0?' disabled':'')+' data-change="voltarget" data-aid="'+aid+'" data-group="'+esc(g)+'"></td>';
    trs+='<tr><td>'+psel+'</td><td class="exname">'+esc(g)+'</td><td>'+recCell+'</td>'+tgtCell+'<td class="num"><b>'+act+'</b>'+(fq?' <span class="tiny">('+fq+'×/sem)</span>':'')+'</td><td style="min-width:110px">'+bar+'</td><td>'+stCell+'</td></tr>';
  });
  const table='<div class="card"><h3>1 · Objetivo semanal por grupo <span class="hint">asigna series/semana guiándote por la banda recomendada</span><button class="btn btn-g btn-sm" style="margin-left:10px" title="Rellena el objetivo de cada grupo con prioridad usando el punto medio de su banda recomendada" data-act="voltargets-auto" data-aid="'+aid+'">Usar recomendados</button></h3>'+
    '<div class="tblwrap"><table class="tbl"><thead><tr><th style="width:130px">Prioridad</th><th>Grupo muscular</th><th style="width:130px">Recomendado</th><th style="width:95px">Objetivo</th><th style="width:105px">Programado</th><th style="width:110px">VM·VME·VMA·VMR</th><th style="width:130px">Estado</th></tr></thead><tbody>'+trs+'</tbody></table></div>'+
    '<p class="tiny mt8">Asigna el objetivo dentro (o fuera, con criterio) de la banda recomendada; el estado pasa a comparar programado vs tu objetivo y sigue avisando si excedes el VMR. «Programado» son las series directas de los ejercicios vinculados. <a data-act="nav" data-view="ref" data-params="{}" style="cursor:pointer">Ver referencias →</a></p></div>';

  return ctx+table+coachDistSesiones(aid);
}

/* ---- paso 2: plan de sesiones (grupo × día, independiente de los ejercicios) ---- */
function coachDistSesiones(aid){
  const d=athData(aid),p=d.profile,days=d.routine.days;
  const tgts=p.volTargets||{};
  /* gestor de sesiones */
  let sess='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px">';
  days.forEach((day,di)=>{sess+='<span class="badge">D'+(di+1)+' · '+esc(day.name)+' <button style="color:var(--tx3);line-height:0;margin-left:4px" title="Renombrar sesión" data-act="day-ren-modal" data-aid="'+aid+'" data-day="'+day.id+'">'+I.edit+'</button><button style="color:var(--tx3);line-height:0" title="Eliminar sesión" data-act="day-del-ask" data-aid="'+aid+'" data-day="'+day.id+'">'+I.x+'</button></span>';});
  sess+='<button class="btn btn-g btn-sm" data-act="day-add-modal" data-aid="'+aid+'">'+I.plus+' Añadir sesión</button></div>';
  if(!days.length)return'<div class="card mt16"><h3>2 · Sesiones y distribución del objetivo</h3>'+sess+'<div class="empty"><b>Define primero tus sesiones</b>Crea los días de entrenamiento y reparte en ellos el objetivo semanal de cada grupo.</div></div>';
  /* programado real por grupo y día (para contrastar plan vs realidad) */
  const progDay={};
  days.forEach((day,di)=>{day.exercises.forEach(e=>{
    const l=e.libId?libById(e.libId):null;if(!l)return;
    const s=parseInt(e.sets,10)||0;if(!s)return;
    (progDay[l.group]=progDay[l.group]||Array(days.length).fill(0))[di]+=s;
  });});
  const dGroups=GROUPS.filter(g=>(tgts[g]!=null&&tgts[g]!=='')||progDay[g]||days.some(day=>((day.plan||{})[g]||0)>0));
  let head='<tr><th>Grupo</th>';
  days.forEach((day,di)=>{head+='<th style="text-align:center" title="'+esc(day.name)+'">D'+(di+1)+'</th>';});
  head+='<th style="width:64px">Plan Σ</th><th style="width:80px">Objetivo</th><th style="width:56px">Δ</th></tr>';
  let trs2='';
  dGroups.forEach(g=>{
    let tot=0,cells='';
    days.forEach((day,di)=>{
      const n=(day.plan||{})[g]||0;tot+=n;
      const pr=(progDay[g]||[])[di]||0;
      cells+='<td style="text-align:center"><span class="dcell'+(n?'':' zero')+'"><button class="setpm" title="Quitar una serie planificada de '+esc(g)+' en '+esc(day.name)+'" data-act="plan-sets" data-aid="'+aid+'" data-day="'+day.id+'" data-group="'+esc(g)+'" data-d="-1">−</button><b>'+n+'</b><button class="setpm" title="Planificar una serie más de '+esc(g)+' en '+esc(day.name)+'" data-act="plan-sets" data-aid="'+aid+'" data-day="'+day.id+'" data-group="'+esc(g)+'" data-d="1">+</button></span>'+(pr!==n&&(pr||n)?'<div class="prog-mini" title="Series ya programadas en la rutina">prog. '+pr+'</div>':'')+'</td>';
    });
    const tgt=tgts[g],hasTgt=tgt!=null&&tgt!=='';
    let dCell='<span class="tiny">—</span>';
    if(hasTgt){const dfx=tot-(+tgt);dCell=dfx===0?'<span class="delta-pill flat">=</span>':'<span class="delta-pill '+(dfx>0?'up':'down')+'">'+(dfx>0?'+':'')+dfx+'</span>';}
    trs2+='<tr><td class="exname">'+esc(g)+'</td>'+cells+'<td class="num" style="text-align:center"><b>'+tot+'</b></td><td class="num" style="text-align:center">'+(hasTgt?tgt:'<span class="tiny">—</span>')+'</td><td style="text-align:center">'+dCell+'</td></tr>';
  });
  /* total planificado por sesión */
  let totRow='<tr><td class="exname tiny">Plan total de la sesión</td>';
  days.forEach(day=>{
    let t=0;Object.keys(day.plan||{}).forEach(g=>{t+=day.plan[g]||0;});
    totRow+='<td class="sesion-total'+(t>30?' hot':'')+'" style="text-align:center" title="Series planificadas en la sesión">'+t+'</td>';
  });
  totRow+='<td colspan="3"></td></tr>';
  return '<div class="card mt16"><h3>2 · Sesiones y distribución del objetivo <span class="hint">planifica series por sesión antes de elegir ejercicios</span></h3>'+sess+
    '<div class="tblwrap"><table class="tbl" style="min-width:560px"><thead>'+head+'</thead><tbody>'+trs2+totRow+'</tbody></table></div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center"><button class="btn btn-g" data-act="plan-auto" data-aid="'+aid+'">Repartir objetivos automáticamente</button>'+
    '<button class="btn btn-p" data-act="nav" data-view="coach-ath" data-params=\'{"aid":"'+aid+'","tab":"rutina"}\'>3 · Construir la rutina →</button></div>'+
    '<p class="tiny mt8">El reparto automático usa la guía del material: 1 sesión por cada 4-10 series del grupo (≈8 por sesión), mínimo 2 estímulos si se busca crecimiento, equilibrando la carga entre días. «prog.» indica lo ya cubierto por ejercicios reales; en la pestaña Rutina cada día muestra qué falta del plan.</p></div>';
}

/* ---------- GUÍA DE MACROS Y TIMING (coach) ----------
   Rangos mín/máx, carbohidratos por intensidad y por ventana (pre/peri/post/recovery)
   y proteína total + post-ejercicio por kg de PESO y por kg de MASA LIBRE DE GRASA.
   Todo se ajusta al peso y la MLG del atleta. Fuentes (PubMed):
   - ISSN protein & exercise (Jäger 2017) · DOI 10.1186/s12970-017-0177-8
   - ISSN nutrient timing (Kerksick 2017) · DOI 10.1186/s12970-017-0189-4
   - AND/DC/ACSM Nutrition & Athletic Performance (Thomas 2016) · DOI 10.1016/j.jand.2015.12.006
   - Morton meta-análisis (BJSM 2018) · DOI 10.1136/bjsports-2017-097608
   - Schoenfeld & Aragon, proteína por comida (2018) · DOI 10.1186/s12970-018-0215-1
   Coincide con los PDF de las carpetas ETTO / The Muscle & Strength Pyramid / Helms. */
function buildMacroGuide(aid){
  const d=athData(aid),p=d.profile,lw=lastWeight(aid);
  const W=lw?lw.kg:0, bf=p.bodyFat||0;
  const FFM=(bf>0&&W>0)?+(W*(1-bf/100)).toFixed(1):0;
  const dot=c=>'<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+c+';margin-right:7px;vertical-align:1px"></span>';
  if(!W) return '<div class="card mb16"><h3>'+I.food+' Guía de macros y timing <span class="hint">rangos basados en evidencia</span></h3><div class="empty"><b>Falta el peso del atleta</b>Registra un peso corporal para calcular los gramos por kg.</div></div>';
  const r=x=>Math.round(x);
  const gw=(lo,hi)=>r(lo*W)+(hi?'–'+r(hi*W):'')+' g';          /* gramos por PESO corporal */
  const gf=(lo,hi)=>FFM?(r(lo*FFM)+(hi?'–'+r(hi*FFM):'')+' g'):'<span style="color:var(--tx3)">—</span>';/* por MLG */
  const ffmTag=FFM?(' · MLG '+FFM+' kg ('+bf+'% grasa)'):' · sin % grasa en el perfil';

  /* A · Rangos recomendados de macros (mín/máx) */
  const macroRows=[
    [dot('#7cd0fb')+'Proteína — mantener/ganar músculo','1.4–2.0 g/kg',gw(1.4,2.0),'Rango suficiente para la mayoría de personas activas (ISSN).'],
    [dot('#7cd0fb')+'Proteína — objetivo hipertrofia','1.6–2.2 g/kg',gw(1.6,2.2),'Sin ganancias extra de MLG por encima de ~1.6 g/kg con suplementación (Morton).'],
    [dot('#7cd0fb')+'Proteína — en déficit (preservar masa)','2.3–3.1 g/kg',gw(2.3,3.1),'Corte/physique. Helms lo define sobre g/kg de MLG (ver tabla de proteína).'],
    [dot('#ffb45c')+'Grasa — mínimo','0.5–1.0 g/kg',gw(0.5,1.0),'No bajar de aquí: hormonas y vitaminas liposolubles.'],
    [dot('#ffb45c')+'Grasa — rango habitual','20–35% de kcal','según objetivo','Se ajusta junto con los carbohidratos.'],

function coachTabRegistros(aid){
  const d=athData(aid);
  let wk='';
  d.logs.workouts.slice().reverse().forEach(w=>{
    let detail='';
    const keys=Object.keys(w.entries||{});
    const doneN=(w.done||[]).length;
    /* localiza el día prescrito de esta sesión para comparar objetivo vs realizado */
    const planDay=d.routine.days.find(dd=>dd.id===w.dayId)||d.routine.days.find(dd=>dd.name===w.dayName);
    let totalSets=0,tonnage=0,exDoneCount=0;
    if(keys.length){
      let rows='';
      keys.forEach(exId=>{
        let presc=null,exName='Ejercicio';
        if(planDay){const f=planDay.exercises.find(e=>e.id===exId);if(f){presc=f;exName=f.name;}}
        if(!presc){d.routine.days.forEach(day=>{const f=day.exercises.find(e=>e.id===exId);if(f){presc=presc||f;exName=f.name;}});}
        const ss=w.entries[exId];
        totalSets+=ss.length;
        let exTon=0;ss.forEach(s=>{exTon+=(s.w||0)*(s.r||0);});tonnage+=exTon;
        const setsTxt=ss.map((s,i)=>'<span class="setpill">S'+(i+1)+' '+(s.w||0)+'×'+(s.r||0)+(s.rir!=null?' <small>@RIR '+s.rir+'</small>':'')+'</span>').join(' ');
        const tgt=presc?('<span class="tiny">'+esc(presc.sets)+'×'+esc(presc.reps)+' · RIR '+esc(presc.rir)+(presc.rest?' · '+esc(presc.rest):'')+'</span>'):'<span class="tiny">—</span>';
        const fb=presc?(ss.length<(parseInt(presc.sets,10)||0)?'<span class="badge orange" title="Hizo menos series que las prescritas">'+ss.length+'/'+presc.sets+' series</span>':'<span class="badge green">'+ss.length+' series</span>'):('<span class="badge">'+ss.length+' series</span>');
        rows+='<tr><td class="exname">'+esc(exName)+'<div>'+tgt+'</div></td><td>'+setsTxt+'</td><td style="white-space:nowrap">'+fb+'</td><td class="num">'+(exTon?Math.round(exTon)+' kg':'—')+'</td></tr>';
      });
      detail='<div class="logdetail"><div class="tblwrap"><table class="tbl" style="min-width:auto"><thead><tr><th>Ejercicio · objetivo</th><th>Series realizadas (kg×reps@RIR)</th><th>Cumpl.</th><th class="num">Tonelaje</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
        '<div class="grid g4" style="margin-top:10px"><div class="stat"><div class="k">Ejercicios</div><div class="v" style="font-size:20px">'+keys.length+(planDay?'<small> / '+planDay.exercises.length+'</small>':'')+'</div><div class="sub">registrados / prescritos</div></div>'+
        '<div class="stat"><div class="k">Series totales</div><div class="v" style="font-size:20px">'+totalSets+'</div><div class="sub">series de trabajo</div></div>'+
        '<div class="stat"><div class="k">Tonelaje</div><div class="v" style="font-size:20px">'+Math.round(tonnage)+'<small> kg</small></div><div class="sub">Σ peso × reps</div></div>'+
        '<div class="stat"><div class="k">RPE / duración</div><div class="v" style="font-size:20px">'+(w.rpe||'—')+(w.dur?'<small> · '+w.dur+'′</small>':'')+'</div><div class="sub">sesión completa</div></div></div></div>';
    }
    const pct=planDay&&planDay.exercises.length?Math.round((keys.length/planDay.exercises.length)*100):null;
    wk+='<div class="logitem" data-act="log-toggle"><div class="lh"><span class="badge volt">'+esc(w.dayName)+'</span>'+(doneN?'<span class="badge green" title="Ejercicios marcados como hechos">✓ '+doneN+'</span>':'')+'<b>RPE '+(w.rpe||'—')+'</b>'+(w.dur?'<span class="tiny">'+w.dur+' min</span>':'')+(keys.length?'<span class="tiny">'+keys.length+' ejercicios'+(pct!=null?' · '+pct+'% del día':'')+' · clic para ver detalle</span>':'<span class="tiny">sin detalle de series</span>')+'<span class="dt">'+fmtDateFull(w.date)+'</span></div>'+(w.comment?'<div class="cm">'+esc(w.comment)+'</div>':'')+detail+'</div>';
  });
  if(!wk)wk='<div class="empty"><b>Sin entrenamientos registrados</b></div>';
  let nut='';
  d.logs.nutrition.slice().reverse().forEach(n=>{const md=(n.mealsDone&&n.mealsDone.length)?'<span class="tiny">'+n.mealsDone.length+' comidas del plan seguidas</span>':(n.planFollowed!=null?'<span class="tiny">'+(n.planFollowed?'siguió su plan':'no siguió del todo')+'</span>':'');nut+='<div class="logitem"><div class="lh">'+adhBadge(n.adherence)+'<b>Adherencia</b>'+md+'<span class="dt">'+fmtDateFull(n.date)+'</span></div>'+(n.comment?'<div class="cm">'+esc(n.comment)+'</div>':'')+'</div>';});
  if(!nut)nut='<div class="empty"><b>Sin registros de nutrición</b></div>';
  let wt='';
  d.logs.weight.slice().reverse().slice(0,10).forEach(w=>{wt+='<tr><td>'+fmtDateFull(w.date)+'</td><td class="num">'+w.kg+' kg</td></tr>';});
  return '<div class="grid g2"><div><div class="sect-h" style="margin-top:0"><h2>Entrenamientos</h2></div>'+wk+'</div>'+
  '<div><div class="sect-h" style="margin-top:0"><h2>Nutrición</h2></div>'+nut+
  '<div class="sect-h"><h2>Peso corporal</h2></div><div class="tblwrap"><table class="tbl" style="min-width:auto"><thead><tr><th>Fecha</th><th>Peso</th></tr></thead><tbody>'+(wt||'<tr><td colspan="2" class="tiny">Sin registros</td></tr>')+'</tbody></table></div></div></div>';
}

/* ================= PESTAÑA RENDIMIENTO (1RM · comparación de sesiones) ================= */
function coachTabRendimiento(aid){
  const d=athData(aid);
  const histEx=[],seen={};
  d.routine.days.forEach(day=>day.exercises.forEach(e=>{if(!seen[e.id]&&e1rmHistory(aid,e.id).length){seen[e.id]=1;histEx.push(e);}}));
  /* 1) calculadora de 1RM */
  let pickOpts='<option value="">— Entrada manual —</option>';
  histEx.forEach(e=>{pickOpts+='<option value="'+e.id+'">'+esc(e.name)+'</option>';});
  const calc='<div class="card mb16"><h3>'+I.chart+' Calculadora de 1RM estimado <span class="hint">peso × reps (+ RIR) → 1RM · Epley y Brzycki promediadas</span></h3>'+
    '<div class="frow"><label>Autorrellenar desde un ejercicio registrado</label><select id="rm_pick" data-change="rm-fill" data-aid="'+aid+'">'+pickOpts+'</select><p class="tiny" style="margin-top:5px">Toma la mejor serie de la última sesión registrada de ese ejercicio. O introduce los valores a mano.</p></div>'+
    '<div class="frow4"><div><label>Peso (kg)</label><input id="rm_w" type="number" step="0.5" placeholder="100"></div>'+
    '<div><label>Repeticiones</label><input id="rm_r" type="number" step="1" placeholder="8"></div>'+
    '<div><label>RIR (opcional)</label><input id="rm_rir" type="number" step="1" placeholder="2"></div>'+
    '<div><label>Ajuste por RIR</label><select id="rm_userir"><option value="1" selected>Sí — usa reps efectivas</option><option value="0">No — solo reps hechas</option></select></div></div>'+
    '<div style="text-align:right"><button class="btn btn-p" data-act="rm-calc" data-aid="'+aid+'">Calcular 1RM</button></div>'+
    '<div id="rmResult"></div></div>';
  /* 2) progresión de 1RM estimado por ejercicio */
  let trend;
  if(!histEx.length)trend='<div class="card mb16"><h3>Progresión de 1RM estimado</h3><div class="empty"><b>Sin series registradas</b>Cuando el atleta registre entrenamientos con peso y repeticiones, aquí verás la curva de fuerza por ejercicio.</div></div>';
  else{
    const selId=route.params.rmEx&&histEx.some(e=>e.id===route.params.rmEx)?route.params.rmEx:histEx[0].id;
    let topts='';histEx.forEach(e=>{topts+='<option value="'+e.id+'"'+(e.id===selId?' selected':'')+'>'+esc(e.name)+'</option>';});
    const hist=e1rmHistory(aid,selId);
    let chart='<div class="empty"><b>1 sesión registrada</b>Registra otra para ver la curva.</div>',tbl='';
    if(hist.length>=2)chart=svgLine(hist.map(h=>({x:h.date,y:h.e1rm})),{color:'#b69cff',unit:'kg'});
    if(hist.length){
      const first=hist[0].e1rm,last=hist[hist.length-1].e1rm,dl=Math.round((last-first)*10)/10,pct=first>0?Math.round((last-first)/first*1000)/10:0;
      let rows='';hist.slice().reverse().slice(0,8).forEach(h=>{const s=h.set;rows+='<tr><td>'+fmtDateFull(h.date)+'</td><td class="num">'+(s?(s.w||0)+'×'+(s.r||0)+(s.rir!=null?' @RIR '+s.rir:''):'—')+'</td><td class="num"><b>'+h.e1rm+' kg</b></td></tr>';});
      tbl='<div class="grid g3 mb16" style="margin-top:14px"><div class="stat"><div class="k">1RM est. actual</div><div class="v">'+last+'<small> kg</small></div><div class="sub">última sesión</div></div>'+
        '<div class="stat"><div class="k">Cambio total</div><div class="v '+(dl>0?'up':dl<0?'down':'')+'">'+(dl>0?'+':'')+dl+'<small> kg</small></div><div class="sub">'+(pct>0?'+':'')+pct+'% desde el inicio</div></div>'+
        '<div class="stat"><div class="k">Sesiones</div><div class="v">'+hist.length+'</div><div class="sub">con este ejercicio</div></div></div>'+
        '<div class="tblwrap"><table class="tbl" style="min-width:auto"><thead><tr><th>Fecha</th><th>Mejor serie</th><th>1RM est.</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    }
    trend='<div class="card mb16"><h3>Progresión de 1RM estimado <span class="hint">la mejor serie de cada sesión, convertida a 1RM</span></h3>'+
      '<div class="frow"><label>Ejercicio</label><select data-change="rm-ex">'+topts+'</select></div>'+chart+tbl+'</div>';
  }
  return calc+trend+sessionCompareCard(aid);
}
function sessionCompareCard(aid){
  const d=athData(aid),days=d.routine.days;
  const lastW=d.logs.workouts.slice().reverse().find(w=>w.entries&&Object.keys(w.entries).length);
  const withLogs=days.filter(day=>d.logs.workouts.some(w=>w.dayId===day.id&&w.entries&&Object.keys(w.entries).length));
  const defDay=(route.params.cmpDay&&days.some(dd=>dd.id===route.params.cmpDay))?route.params.cmpDay:(lastW?lastW.dayId:(withLogs[0]?withLogs[0].id:(days[0]?days[0].id:null)));
  let opts='';days.forEach(day=>{const n=d.logs.workouts.filter(w=>w.dayId===day.id&&w.entries&&Object.keys(w.entries).length).length;opts+='<option value="'+day.id+'"'+(day.id===defDay?' selected':'')+'>'+esc(day.name)+' · '+n+' ses.</option>';});
  const sel='<div class="frow"><label>Sesión a comparar</label><select data-change="cmp-day">'+opts+'</select><p class="tiny" style="margin-top:5px">Compara la sesión más reciente de ese día contra la anterior del mismo día.</p></div>';
  const logs=d.logs.workouts.filter(w=>w.dayId===defDay&&w.entries&&Object.keys(w.entries).length).slice().sort((a,b)=>a.date<b.date?-1:1);
  let body;
  if(logs.length<2)body='<div class="empty"><b>Necesitas 2 sesiones de este día</b>Hay '+logs.length+' sesión registrada de este día. Cuando haya al menos dos, verás la comparación ejercicio por ejercicio.</div>';
  else{
    const cur=logs[logs.length-1],prev=logs[logs.length-2];
    const exIds=[];Object.keys(cur.entries).forEach(k=>exIds.push(k));Object.keys(prev.entries).forEach(k=>{if(exIds.indexOf(k)<0)exIds.push(k);});
    let rows='';
    exIds.forEach(exId=>{
      const cs=cur.entries[exId],ps=prev.entries[exId];
      const ce=cs?bestSetE1RM(cs).e1rm:0,pe=ps?bestSetE1RM(ps).e1rm:0;
      const ct=cs?topSetOf(cs):null,pt=ps?topSetOf(ps):null;
      const cton=cs?exTonnage(cs):0,pton=ps?exTonnage(ps):0;
      const de=Math.round((ce-pe)*10)/10;
      const pill=(!ps||!cs)?'<span class="delta-pill flat">'+(cs?'nuevo':'no repetido')+'</span>':(de===0?'<span class="delta-pill flat">=</span>':'<span class="delta-pill '+(de>0?'up':'down')+'">'+(de>0?'+':'')+de+' kg</span>');
      rows+='<tr><td class="exname">'+esc(exNameOf(d,exId))+'</td>'+
        '<td class="num">'+(pt?(pt.w||0)+'×'+(pt.r||0):'—')+'<div class="tiny">'+(pe?pe+' kg 1RM · '+Math.round(pton)+' kg vol':'—')+'</div></td>'+
        '<td class="num">'+(ct?(ct.w||0)+'×'+(ct.r||0):'—')+'<div class="tiny">'+(ce?ce+' kg 1RM · '+Math.round(cton)+' kg vol':'—')+'</div></td>'+
        '<td>'+pill+'</td></tr>';
    });
    const ctonS=sessTonnage(cur),ptonS=sessTonnage(prev);
    const csets=Object.values(cur.entries).reduce((a,s)=>a+s.length,0),psets=Object.values(prev.entries).reduce((a,s)=>a+s.length,0);
    const cR=sessSRPE(cur),pR=sessSRPE(prev);
    const dStat=(c,p,unit)=>{const dl=Math.round((c-p)*10)/10;return'<div class="sub '+(dl>0?'up':dl<0?'down':'')+'">'+(dl>0?'+':'')+dl+(unit||'')+' vs anterior</div>';};
    const totals='<div class="grid g4" style="margin-top:14px"><div class="stat"><div class="k">Tonelaje</div><div class="v" style="font-size:20px">'+Math.round(ctonS).toLocaleString('es-ES')+'<small> kg</small></div>'+dStat(ctonS,ptonS,' kg')+'</div>'+
      '<div class="stat"><div class="k">Series</div><div class="v" style="font-size:20px">'+csets+'</div>'+dStat(csets,psets,'')+'</div>'+
      '<div class="stat"><div class="k">Carga sRPE</div><div class="v" style="font-size:20px">'+cR+'<small> UA</small></div>'+dStat(cR,pR,' UA')+'</div>'+
      '<div class="stat"><div class="k">RPE · duración</div><div class="v" style="font-size:20px">'+(cur.rpe||'—')+(cur.dur?'<small> · '+cur.dur+'′</small>':'')+'</div><div class="sub">sesión actual</div></div></div>';
    body='<div class="tblwrap"><table class="tbl"><thead><tr><th>Ejercicio</th><th>Anterior · '+fmtDate(prev.date)+'</th><th>Actual · '+fmtDate(cur.date)+'</th><th>Δ 1RM</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+totals+
      '<p class="tiny mt8">«vol» = tonelaje del ejercicio (Σ peso×reps). «Δ 1RM» compara el 1RM estimado de la mejor serie de cada sesión. sRPE = RPE × duración (carga interna de la sesión).</p>';
  }
  return '<div class="card mb16"><h3>Comparación de sesiones <span class="hint">mismo día: sesión actual vs anterior</span></h3>'+sel+body+'</div>';
}

/* ================= PESTAÑA PROGRESO (de lo general a lo específico, con alcance/rango) ================= */
function pgWeekNum(aid,iso){const start=athData(aid).routine.startDate||todayISO();return Math.floor((Date.parse(iso)-Date.parse(start))/86400000/7)+1;}
function pgWindow(aid){
  const r=athData(aid).routine,start=r.startDate||todayISO(),wkNow=weekOf(aid),today=todayISO();
  const rng=route.params.pgRange||'all';
  if(rng==='custom'){
    let a=parseInt(route.params.pgWkA,10)||1,b=parseInt(route.params.pgWkB,10)||wkNow;
    if(a>b){const t=a;a=b;b=t;}a=Math.max(1,a);b=Math.max(a,b);
    return{from:addDaysISO(start,(a-1)*7),to:addDaysISO(start,b*7-1),label:'Semanas '+a+'–'+b,wkA:a,wkB:b};
  }
  if(rng==='4'||rng==='8'||rng==='12'){const n=parseInt(rng,10);return{from:daysAgoISO(n*7-1),to:today,label:'Últimas '+n+' semanas',wkA:Math.max(1,wkNow-n+1),wkB:wkNow};}
  const ws=athData(aid).logs.workouts;let from=start;if(ws.length){const e=ws.reduce((m,w)=>w.date<m?w.date:m,ws[0].date);from=e<start?e:start;}
  return{from,to:today,label:'Todo el historial',wkA:1,wkB:wkNow};
}

    '<p class="tiny mt8">El 1RM estimado ya incorpora reps y RIR: un mismo peso con más reps o más lejos del fallo (RIR mayor) sube la curva aunque la carga no cambie. 🏆 marca récords históricos.</p></div>';
}
/* alertas de progreso del rango: récords logrados y ejercicios a vigilar (estancado/regresión) */
function pgAlerts(aid,win){
  const d=athData(aid),seen={},prs=[],warn=[];
  d.routine.days.forEach(day=>day.exercises.forEach(e=>{
    if(seen[e.id])return;seen[e.id]=1;
    const ser=exSeries(aid,e.id).filter(x=>x.date>=win.from&&x.date<=win.to);
    if(!ser.length)return;
    ser.forEach(s=>{if(s.pr)prs.push({name:e.name,date:s.date,e1:s.prE1,w:s.prW,t:s.prTon,e1rm:s.e1rm,topW:s.topW,topR:s.topR});});
    const st=exStatus(ser);if(st&&(st.k==='estancado'||st.k==='regresion'))warn.push({name:e.name,st});
  }));
  if(!prs.length&&!warn.length)return '';
  const prH=prs.slice().reverse().slice(0,6).map(p=>'<div class="logitem"><div class="lh"><span class="badge volt">🏆 '+[p.e1?'1RM':'',p.w?'Peso':'',p.t?'Vol':''].filter(Boolean).join('/')+'</span><b>'+esc(p.name)+'</b><span class="muted" style="font-size:12.5px">'+p.topW+'×'+p.topR+' · '+p.e1rm+' kg 1RM</span><span class="dt">'+fmtDate(p.date)+'</span></div></div>').join('');
  const wH=warn.map(w=>'<div class="logitem"><div class="lh"><span class="badge '+(w.st.cls||'')+'">'+esc(w.st.lbl)+'</span><b>'+esc(w.name)+'</b><span class="muted" style="font-size:12.5px">'+esc(w.st.detail)+'</span></div></div>').join('');
  return '<div class="grid g2 mb16">'+
    '<div class="card" style="margin:0"><h3>🏆 Récords en el rango <span class="hint">PR de 1RM, peso o volumen</span></h3>'+(prH||'<div class="empty"><b>Sin récords nuevos</b>Aún no hay marcas en el rango.</div>')+'</div>'+
    '<div class="card" style="margin:0"><h3>A vigilar <span class="hint">estancamiento o regresión</span></h3>'+(wH||'<div class="empty"><b>Todo en orden</b>Ningún ejercicio estancado ni en regresión.</div>')+'</div></div>';
}
