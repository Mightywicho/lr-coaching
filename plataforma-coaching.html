  'diet-calc':el=>{
    const aid=el.dataset.aid;
    const sex=val('dc_sex')||'M',A=num('dc_age'),W=num('dc_w'),H=num('dc_h'),bf=num('dc_bf');
    let FFM=num('dc_ffm');
    if(!FFM&&bf>0&&W>0)FFM=+(W*(1-bf/100)).toFixed(1);
    if(!W||!H){toast('Falta el peso o la altura');return;}
    const eqs=rmrEquations(W,H,A,sex,FFM);
    const eqKey=val('dc_eq');
    const chosen=eqs[eqKey];
    if(!chosen){toast('Esa fórmula necesita la masa libre de grasa (introduce % grasa o MLG)');return;}
    const rmr=chosen.val;
    /* gasto total */
    const palMan=num('dc_palman');
    const pal=palMan>0?palMan:(parseFloat(val('dc_pal'))||1.55);
    const tdee=Math.round(rmr*pal);
    const methodTxt='Factor ×'+pal+(palMan>0?' (manual)':'');
    /* objetivo */
    const dir=parseInt(val('dc_goal'),10)||0,adjtype=val('dc_adjtype'),adjval=num('dc_adjval');
    let delta=0,goalTxt='Mantenimiento';
    if(dir!==0){
      if(adjtype==='pct'){const kgWk=W*(adjval/100);delta=Math.round(dir*kgWk*KCAL_PER_KG/7);goalTxt=(dir<0?'Déficit':'Superávit')+' · '+adjval+'%/sem ('+(dir<0?'−':'+')+Math.abs(Math.round(kgWk*1000))+' g/sem)';}
      else{delta=Math.round(dir*adjval);goalTxt=(dir<0?'Déficit':'Superávit')+' · '+adjval+' kcal/día';}
    }
    const target=Math.max(1000,tdee+delta);
    /* macros */
    const protGkg=num('dc_prot')||2,protBase=val('dc_protbase'),fatVal=num('dc_fat')||25,fatMode=val('dc_fatmode');
    const protRef=(protBase==='ffm'&&FFM>0)?FFM:W;
    let protein=Math.round(protGkg*protRef);
    let fat=fatMode==='gkg'?Math.round(fatVal*W):Math.round(target*(fatVal/100)/9);
    let carbsKcal=target-(protein*4+fat*9);
    let carbs=Math.round(carbsKcal/4);
    let warn='';
    if(carbs<0){carbs=0;warn='<p class="tiny" style="color:var(--red)">⚠ Proteína + grasa superan las kcal objetivo. Baja la grasa o la proteína.</p>';}
    if(protBase==='ffm'&&FFM<=0)warn+='<p class="tiny" style="color:var(--orange)">Pediste proteína por MLG pero no hay MLG; se usó el peso corporal.</p>';
    const realKcal=protein*4+carbs*4+fat*9;
    /* comparación de fórmulas */
    let cmp='';Object.keys(eqs).forEach(k=>{const e=eqs[k];cmp+='<tr'+(k===eqKey?' style="background:rgba(205,245,99,.08)"':'')+'><td>'+esc(e.name)+(k===eqKey?' ✓':'')+'</td><td class="num"><b>'+e.val+'</b> kcal</td></tr>';});
    let ratePct=0;
    if(dir!==0){if(adjtype==='pct')ratePct=dir*adjval;else ratePct=+((dir*adjval*7/KCAL_PER_KG)/W*100).toFixed(2);}
    DIETRES={aid,kcal:target,protein,carbs,fat,ratePct:+(+ratePct).toFixed(2)};
    const html='<hr class="hr"><div class="grid g4 mb16">'+
      '<div class="stat"><div class="k">TMB / RMR</div><div class="v">'+rmr+'<small> kcal</small></div><div class="sub">'+esc(chosen.name)+'</div></div>'+
      '<div class="stat"><div class="k">Gasto total (TDEE)</div><div class="v">'+tdee+'<small> kcal</small></div><div class="sub">'+esc(methodTxt)+'</div></div>'+
      '<div class="stat"><div class="k">Objetivo calórico</div><div class="v '+(delta<0?'down':delta>0?'up':'')+'">'+target+'<small> kcal</small></div><div class="sub">'+esc(goalTxt)+'</div></div>'+
      '<div class="stat"><div class="k">MLG usada</div><div class="v">'+(FFM>0?FFM+'<small> kg</small>':'—')+'</div><div class="sub">'+(bf>0?bf+'% grasa':'sin dato')+'</div></div></div>'+
      '<div class="grid g2"><div class="card"><h3>Macros propuestos <span class="hint">'+realKcal+' kcal reales</span></h3>'+
      macroBars({kcal:target,protein,carbs,fat},true)+
      '<p class="tiny mt8">Proteína '+protein+' g ('+(protGkg)+' g/kg '+(protBase==='ffm'&&FFM>0?'MLG':'peso')+') · Grasa '+fat+' g ('+(fatMode==='gkg'?fatVal+' g/kg':fatVal+'%')+') · Carbohidratos '+carbs+' g (resto).</p>'+warn+
      '<button class="btn btn-p" data-act="diet-apply" data-aid="'+aid+'" style="width:100%;margin-top:8px">Aplicar a los objetivos de macros</button></div>'+
      '<div class="card"><h3>Comparativa de fórmulas <span class="hint">misma TMB, distinta ecuación</span></h3><div class="tblwrap"><table class="tbl" style="min-width:auto"><thead><tr><th>Ecuación</th><th class="num">TMB</th></tr></thead><tbody>'+cmp+'</tbody></table></div>'+
      '<p class="tiny mt8">Ten-Haaf, Cunningham, Harris-Benedict (1918) y De Lorenzo son las más precisas en atletas (O’Neill et al., Sports Med 2023). Las que usan MLG requieren composición corporal fiable.</p></div></div>';
    const box=document.getElementById('dietResult');
    if(box){box.innerHTML=html;box.scrollIntoView({behavior:'smooth',block:'nearest'});}
  },

      '<p class="tiny mt8">El 1RM estimado es más fiable con ≤ 8-10 reps y cerca del fallo; a más reps, más error. Úsalo para autorregular cargas, no como sustituto de un test directo.</p></div></div>';
    const box=document.getElementById('rmResult');if(box){box.innerHTML=html;box.scrollIntoView({behavior:'smooth',block:'nearest'});}

/* ===== coincidencia perfil ⇄ ejercicio / alimento ===== */
function normTxt(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
/* parte un texto libre (lista de nombres separados por coma, salto, ; · /) en términos buscables */
function profileTokens(txt,min){min=min||4;return normTxt(txt).split(/[,;\n·\/]+|\sy\s|\se\s/).map(t=>t.replace(/[().]/g,'').trim()).filter(t=>t.length>=min);}
/* mapa lesión (región) → patrones de ejercicio a vigilar */
const INJURY_MAP=[
 {k:['hombro','manguito','rotador','deltoid','clavicul','acromio'],ex:['press militar','press de hombro','press sobre','press tras nuca','press vertical','arnold','elevacion frontal','jalon al menton','jalon al rostro','face pull']},
 {k:['rodilla','menisco','rotulian','patelar','ligamento cruzado'],ex:['sentadilla','prensa','zancada','desplante','split','bulgara','extension de cuadriceps','extension de rodilla','hack','salto']},
 {k:['lumbar','lumbalgia','espalda baja','hernia','disco','sacro','ciatic'],ex:['peso muerto','remo con barra','sentadilla','buenos dias','good morning','hiperextension','reverencia','pull through','remo pendlay']},
 {k:['cadera','psoas','femoroacetabular','ingle'],ex:['sentadilla','peso muerto','hip thrust','zancada','prensa','aduccion']},
 {k:['codo','epicondil','tendinitis de codo'],ex:['curl','extension de triceps','rompecraneos','press cerrado','press de banca agarre cerrado','jalon']},
 {k:['muñeca','muneca','carpo','tunel'],ex:['curl','press','antebrazo','muñeca']},
 {k:['cervical','cuello','trapecio'],ex:['encogimiento','jalon al menton','press militar','peso muerto']},
 {k:['tobillo','aquiles'],ex:['gemelo','talon','salto','sentadilla']}
];
/* devuelve avisos para un ejercicio según el perfil de entrenamiento del atleta */
function exFlags(aid,exName){
  const d=athData(aid);if(!d)return{injury:'',avoid:'',like:''};
  const tr=d.profile.training||{},n=normTxt(exName),out={injury:'',avoid:'',like:''};
  if(!n)return out;
  for(const t of profileTokens(tr.dislikes)){if(n.includes(t)){out.avoid=t;break;}}
  for(const t of profileTokens(tr.likes)){if(n.includes(t)){out.like=t;break;}}
  const inj=normTxt(tr.injuries);
  if(inj){for(const r of INJURY_MAP){if(r.k.some(k=>inj.includes(k))&&r.ex.some(e=>n.includes(e))){out.injury=r.k.find(k=>inj.includes(k));break;}}}
  return out;
}
/* chip(s) de aviso a partir de exFlags */
function exFlagChips(f){
  let h='';
  if(f.injury)h+=' <span class="badge red" title="Posible conflicto con lesión/limitación: '+esc(f.injury)+'">⚠ lesión</span>';
  if(f.avoid)h+=' <span class="badge orange" title="En la lista de evitar: '+esc(f.avoid)+'">🚫 evitar</span>';
  if(f.like)h+=' <span class="badge volt" title="Ejercicio favorito del atleta">★</span>';
  return h;
}
/* términos buscables: frases + palabras significativas (para alergias escritas como frase) */
function termList(txt,min){min=min||4;const set=new Set();profileTokens(txt,3).forEach(t=>{if(t.length>=min)set.add(t);t.split(/\s+/).forEach(w=>{w=w.replace(/[^a-z0-9ñ]/g,'');if(w.length>=min&&!['para','como','mucha','mucho','poca','poco','algo','alergia','evitar','grandes','cantidades'].includes(w))set.add(w);});});return[...set];}
/* conflicto de un alimento con el perfil de alimentación */
function foodConflict(aid,foodName){
  const n=normTxt(foodName);if(!n)return{type:'',term:''};
  const dp=nutriOf(aid).dietProfile||{};
  for(const t of termList(dp.allergies)){if(n.includes(t)){return{type:'allergy',term:t};}}
  for(const t of termList(dp.dislikes)){if(n.includes(t)){return{type:'avoid',term:t};}}
  return{type:'',term:''};
}
function foodConflictChip(c){
  if(c.type==='allergy')return ' <span class="badge red" title="ALERGIA declarada: '+esc(c.term)+'">⚠ alergia</span>';
  if(c.type==='avoid')return ' <span class="badge orange" title="No le gusta / evitar: '+esc(c.term)+'">🚫 evitar</span>';
  return '';
}
/* series directas por categoría (patrón) de un grupo, excluyendo un ejercicio */
function exCatDirectExcluding(aid,exId,group){
  const o={};
  athData(aid).routine.days.forEach(day=>day.exercises.forEach(e=>{
    if(exId&&e.id===exId)return;
    const l=e.libId?libById(e.libId):null;const s=parseInt(e.sets,10)||0;
    if(l&&l.group===group&&l.cat&&s)o[l.cat]=(o[l.cat]||0)+s;
  }));
  return o;
}
/* series directas por grupo excluyendo un ejercicio (para previsualizar el alta/edición en vivo) */
function exGroupDirectExcluding(aid,exId){
  const o={};
  athData(aid).routine.days.forEach(day=>day.exercises.forEach(e=>{
    if(exId&&e.id===exId)return;
    const l=e.libId?libById(e.libId):null;const s=parseInt(e.sets,10)||0;
    if(l&&s)o[l.group]=(o[l.group]||0)+s;
  }));
  return o;
}
/* tarjeta de impacto del ejercicio sobre el volumen semanal del grupo */
function exVolCore(aid,exId,nm,sets){
  const lib=libByName(nm);
  if(!lib)return '<p class="tiny" style="margin:0;color:var(--tx3)">Escribe el ejercicio y elígelo de tu biblioteca para ver el impacto en el volumen del grupo. Los ejercicios no vinculados no suman volumen.</p>';
  const g=lib.group,p=athData(aid).profile;
  const base=(exGroupDirectExcluding(aid,exId)[g])||0,proj=base+(parseInt(sets,10)||0);
  const prio=p.priorities[g],rec=volumeRec(g,p.experience,p.phase,p.block,prio),L=rec?rec.L:null;
  const tgt=(p.volTargets||{})[g],hasTgt=tgt!=null&&tgt!=='';
  const st=(rec&&prio!==0&&hasTgt)?targetStatus(proj,+tgt,L):(rec?volumeStatus(proj,rec,prio):{cls:'',txt:'—'});
  let bar='';
  if(rec&&prio!==0&&L){
    const scale=Math.max(L.vmr,rec.hi,proj,hasTgt?+tgt:0,1);
    const left=Math.round(rec.lo/scale*100),w=Math.max(2,Math.round((rec.hi-rec.lo)/scale*100)),ax=Math.min(100,Math.round(proj/scale*100));
    bar='<div class="volbar" style="margin:8px 0" title="VME '+L.vme+' · VMA '+L.vma+' · VMR '+L.vmr+'"><span class="rng" style="left:'+left+'%;width:'+w+'%"></span><span class="act" style="left:'+ax+'%"></span></div>';
  }
  const recTxt=(rec&&prio!==0)?('Recomendado '+rec.lo+'–'+rec.hi+' series/sem'+(hasTgt?' · objetivo '+tgt:'')+' · prioridad '+(PRIOS[prio]?PRIOS[prio].lbl:'')):'Este grupo está como «no entrenar» en la fase actual.';
  const sec=(lib.secondary||[]).length?'<p class="tiny" style="margin:6px 0 0;color:var(--tx3)">Indirecto: '+esc(lib.secondary.join(', '))+'</p>':'';
  /* categoría / patrón biomecánico */
  let catTxt='';
  if(lib.cat){
    const catB=(exCatDirectExcluding(aid,exId,g)[lib.cat])||0,catP=catB+(parseInt(sets,10)||0);
    const ci=catInfo(g,lib.cat),defined=(GROUP_CATS[g]||[]);
    const coveredNow=exCatDirectExcluding(aid,exId,g),coveredCount=defined.filter(ct=>coveredNow[ct.c]).length+(catB?0:1);
    const nuevo=catB===0;
    catTxt='<p class="tiny" style="margin:6px 0 0"><span class="mini-chip" title="'+esc(ci?ci.p:'')+(ci?' · Cargas '+esc(ci.l):'')+'">Patrón '+esc(lib.cat)+'</span> '+catB+' → '+catP+' series'+(nuevo?' <span style="color:var(--volt)">· patrón nuevo en el grupo</span>':' <span style="color:var(--tx3)">· patrón ya trabajado</span>')+' · cubre '+Math.min(coveredCount,defined.length)+'/'+defined.length+' patrones de '+esc(g)+'</p>';
  } else if(lib.group){catTxt='<p class="tiny" style="margin:6px 0 0;color:var(--tx3)">Sin categoría asignada en la biblioteca — no se puede valorar la cobertura de patrones.</p>';}
  const flags=exFlags(aid,nm),fchips=exFlagChips(flags);
  let warn='';
  if(flags.injury)warn+='<div class="notebox" style="border-left-color:var(--red);margin:8px 0 0">⚠️ Posible conflicto con una lesión/limitación del atleta («'+esc(flags.injury)+'»). Revisa la técnica o elige una variante alternativa.</div>';
  if(flags.avoid)warn+='<div class="notebox" style="border-left-color:var(--orange);margin:8px 0 0">🚫 Está en la lista de ejercicios a evitar («'+esc(flags.avoid)+'»). Considera una variante que cubra el mismo patrón.</div>';
  if(flags.like&&!flags.injury&&!flags.avoid)warn+='<div class="notebox" style="border-left-color:var(--volt);margin:8px 0 0">★ Ejercicio favorito del atleta — buena elección para la adherencia.</div>';
  return '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px"><span class="mini-chip">'+esc(g)+'</span><b style="font-size:13px">'+base+' → '+proj+' series/sem</b>'+((parseInt(sets,10)||0)?'<span class="tiny" style="color:var(--volt)">(+'+(parseInt(sets,10)||0)+')</span>':'')+fchips+'<span class="badge '+(st.cls||'')+'" style="margin-left:auto">'+esc(st.txt)+'</span></div>'+bar+'<p class="tiny" style="margin:0">'+recTxt+'</p>'+catTxt+sec+warn;
}
function renderExVol(){const box=document.getElementById('exvolbox');if(!box)return;box.innerHTML=exVolCore(box.dataset.aid,box.dataset.ex||'',val('e_name'),val('e_sets'));}

}

function weekStrip(aid){
  const d=athData(aid);
  let h='<div class="week mb16">';
  for(let i=6;i>=0;i--){
    const iso=daysAgoISO(i);const[y,m,dd]=iso.split('-').map(Number);const dt=new Date(y,m-1,dd);
    const hasW=d.logs.workouts.some(w=>w.date===iso),hasN=d.logs.nutrition.some(n=>n.date===iso);
    h+='<div class="wday'+(i===0?' today':'')+'"><div class="d">'+DIAS[dt.getDay()]+'</div><div class="n">'+dd+'</div><div class="dots">'+(hasW?'<span class="dot" style="background:var(--volt)"></span>':'')+(hasN?'<span class="dot" style="background:var(--orange)"></span>':'')+'</div></div>';
  }
  return h+'</div><div class="legend mb16"><span><i style="background:var(--volt)"></i>Entreno registrado</span><span><i style="background:var(--orange)"></i>Nutrición registrada</span></div>';
}

VIEWS['ath-prog']=function(u){
  if(!svcOf(u.id).tr)return VIEWS['ath-hoy'](u);
  const aid=u.id,d=athData(aid);
  const wpts=d.logs.weight.map(w=>({x:w.date,y:w.kg}));
  const allEx=[];d.routine.days.forEach(day=>day.exercises.forEach(e=>allEx.push(e)));
  const selId=route.params.ex||(allEx[0]?allEx[0].id:null);
  let opts='';allEx.forEach(e=>{opts+='<option value="'+e.id+'"'+(e.id===selId?' selected':'')+'>'+esc(e.name)+'</option>';});
  let exChart='<div class="empty"><b>Sin datos de este ejercicio</b>Registra entrenamientos para ver tu progresión de cargas.</div>',exTable='';
  if(selId){
    const hist=exHistory(aid,selId);
    if(hist.length>=2)exChart=svgLine(hist.map(h=>({x:h.date,y:h.best})),{color:'#cdf563',unit:'kg'});
    else if(hist.length===1)exChart='<div class="empty"><b>1 sesión registrada</b>Mejor serie: '+hist[0].best+' kg × '+hist[0].reps+'. Registra otra para ver la curva.</div>';
    if(hist.length){
      let rows='';hist.slice().reverse().slice(0,8).forEach(h=>{rows+='<tr><td>'+fmtDateFull(h.date)+'</td><td class="num">'+h.sets.map(s=>(s.w||0)+'×'+(s.r||0)+(s.rir!=null?' @'+s.rir:'')).join(' · ')+'</td><td class="num"><b>'+h.best+' kg</b></td></tr>';});
      exTable='<div class="tblwrap mt16"><table class="tbl" style="min-width:auto"><thead><tr><th>Fecha</th><th>Series (kg×reps @RIR)</th><th>Mejor</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    }
  }
  const d30=weightDelta(aid,30),w7=workoutsInLast(aid,7),adh=adherenceAvg(aid,7);
  const ww=weightWeekly(aid),sw=stepsWeekly(aid);
  const curW=ww.length?ww[ww.length-1]:null,curS=sw.length?sw[sw.length-1]:null;
  const rate=weeklyRate(aid,3);
  /* tabla semanal de peso: media, registros y Δ vs semana previa */
  let wwTable='';
  if(ww.length){
    let rows='';ww.slice().reverse().slice(0,10).forEach(w=>{
      const cls=w.delta==null?'flat':(w.delta>0.05?'up':w.delta<-0.05?'down':'flat');
      const dtx=w.delta==null?'—':(w.delta>0?'+':'')+w.delta.toFixed(2)+' kg <small>('+(w.pct>0?'+':'')+w.pct.toFixed(2)+'%)</small>';
      rows+='<tr'+(w.n<3?' style="opacity:.55"':'')+'><td>Sem. '+fmtDate(w.week)+(w.n<3?' *':'')+'</td><td class="num"><b>'+w.avg.toFixed(1)+' kg</b></td><td class="num">'+w.n+'</td><td class="num '+cls+'">'+dtx+'</td></tr>';
    });
    wwTable='<div class="tblwrap mt16"><table class="tbl" style="min-width:auto"><thead><tr><th>Semana (desde lunes)</th><th>Peso medio</th><th>Pesajes</th><th>Δ vs semana previa</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<p class="tiny mt8">* Semanas con menos de 3 pesajes: media orientativa. El ritmo semanal del resumen solo compara semanas con ≥ 3 pesajes.</p>';
  }
  const wwChart=ww.length>=2?svgLine(ww.map(w=>({x:w.week,y:+w.avg.toFixed(1)})),{color:'#cdf563',unit:'kg'}):'<div class="empty"><b>Aún no hay 2 semanas con pesajes</b>Registra tu peso varios días por semana para ver la tendencia.</div>';
  /* pasos */
  const spts=(d.logs.steps||[]).map(s=>({x:s.date,y:s.steps}));
  let swTable='';
  if(sw.length){
    let rows='';sw.slice().reverse().slice(0,10).forEach(w=>{rows+='<tr><td>Sem. '+fmtDate(w.week)+'</td><td class="num"><b>'+Math.round(w.avg).toLocaleString('es-ES')+'</b></td><td class="num">'+w.n+'</td></tr>';});
    swTable='<div class="tblwrap mt16"><table class="tbl" style="min-width:auto"><thead><tr><th>Semana (desde lunes)</th><th>Media diaria</th><th>Días registrados</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  return{title:'Mi progreso',crumb:'Peso, pasos, cargas y adherencia',
    body:'<div class="grid g3 mb16">'+
    '<div class="stat"><div class="k">Cambio de peso 30d</div><div class="v '+(d30>0?'up':d30<0?'down':'')+'">'+(d30!=null?(d30>0?'+':'')+d30+'<small> kg</small>':'—')+'</div></div>'+
    '<div class="stat"><div class="k">Ritmo semanal</div><div class="v '+(rate&&rate.delta>0?'up':rate&&rate.delta<0?'down':'')+'">'+(rate?(rate.delta>0?'+':'')+rate.delta.toFixed(2)+'<small> kg/sem</small>':'—')+'</div><div class="sub">'+(rate?(rate.pct>0?'+':'')+rate.pct.toFixed(2)+'% de tu peso/sem · semanas con ≥3 pesajes':'necesita 2 semanas con ≥3 pesajes')+'</div></div>'+
    '<div class="stat"><div class="k">Peso medio · semana actual</div><div class="v">'+(curW?curW.avg.toFixed(1)+'<small> kg</small>':'—')+'</div><div class="sub">'+(curW?curW.n+' pesaje'+(curW.n===1?'':'s')+' esta semana':'sin pesajes esta semana')+'</div></div></div>'+
    '<div class="grid g3 mb16">'+
    '<div class="stat"><div class="k">Pasos · media semana actual</div><div class="v">'+(curS?Math.round(curS.avg).toLocaleString('es-ES'):'—')+'</div><div class="sub">'+(curS?curS.n+' día'+(curS.n===1?'':'s')+' registrados':'registra tus pasos en «Hoy»')+'</div></div>'+
    '<div class="stat"><div class="k">Entrenos 7d</div><div class="v">'+w7+'<small> / '+d.routine.days.length+'</small></div></div>'+
    '<div class="stat"><div class="k">Adherencia 7d</div><div class="v">'+(adh!=null?adh+'<small> / 5</small>':'—')+'</div></div></div>'+
    '<div class="card"><h3>Tendencia de peso semanal <span class="hint">media de cada semana — más fiable que el día a día</span></h3>'+wwChart+wwTable+'</div>'+
    '<div class="card"><h3>Peso corporal diario <span class="hint">'+d.logs.weight.length+' registros</span></h3>'+svgLine(wpts,{color:'#7cd0fb',unit:'kg'})+'</div>'+
    '<div class="card"><h3>Pasos diarios <span class="hint">'+spts.length+' registros</span></h3>'+(spts.length>=2?svgLine(spts,{color:'#ffb45c'}):'<div class="empty"><b>Sin datos de pasos suficientes</b>Registra tus pasos cada día desde «Hoy» para ver la gráfica.</div>')+swTable+'</div>'+
    '<div class="card"><h3>Progresión de cargas</h3><div class="frow"><label>Ejercicio</label><select data-change="prog-ex">'+opts+'</select></div>'+exChart+exTable+'</div>'};
};

/* ================= BIBLIOTECA DE EJERCICIOS ================= */
function ytId(url){const m=String(url||'').match(/(?:youtube\.com\/(?:watch\?\S*?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{6,})/);return m?m[1]:null;}
function videoEmbed(v){
  if(!v)return'';
  if(v.type==='youtube'){const id=ytId(v.url);if(!id)return'';
    return'<div class="video-wrap"><iframe src="https://www.youtube-nocookie.com/embed/'+id+'" title="Video del ejercicio" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>';}
  if(v.type==='file'&&v.file)return'<div class="video-wrap"><video controls preload="metadata" src="videos/'+esc(v.file)+'"></video></div><p class="video-note">Archivo local: <b>videos/'+esc(v.file)+'</b> — el video debe estar en una carpeta llamada «videos» junto a este archivo HTML.</p>';
  return'';
}
function muscleChips(l,full){
  let h='<div class="muschips"><span class="chip pri">'+esc(l.group)+'</span>';
  if(l.cat)h+='<span class="chip cat" title="'+esc((catInfo(l.group,l.cat)||{}).p||'')+'">Cat. '+esc(l.cat)+'</span>';
  if(l.focus)h+='<span class="chip" style="border-style:dashed">→ '+esc(l.focus)+'</span>';
  if(full)(l.secondary||[]).forEach(m=>{h+='<span class="chip">'+esc(m)+'</span>';});
  return h+'</div>';
}
function libUsage(libId){
  const out=[];
  athleteUsers().forEach(a=>{
    const days=[];
    athData(a.id).routine.days.forEach(day=>{if(day.exercises.some(e=>e.libId===libId))days.push(day.name);});
    if(days.length)out.push(esc(a.name)+' ('+days.map(esc).join(', ')+')');
  });
  return out;
}

/* ===== MATRIZ TEÓRICA DE VOLUMEN — prioridad × nivel × fase ===== */
/* Rangos semanales LITERALES por prioridad (series/sem por grupo), Jay Ehrenstein · Volumen de Entrenamiento Parte II */
const REF_PRIO=[
 {id:'maxima',lbl:'Máxima',cls:'t-maxima',band:[18,32],est:'3-4',land:'VMR · 80-100%',note:'Solo especialización (1-2 músculos). Usar con cautela y justificación.'},
 {id:'primaria',lbl:'Primaria',cls:'t-primaria',band:[12,24],est:'2-3',land:'VMA (parte alta)',note:'Músculos a desarrollar (1-4 en un programa general).'},
 {id:'secundaria',lbl:'Secundaria',cls:'t-secundaria',band:[6,16],est:'1-2',land:'VME a VMA',note:'6-8 series con 1 estímulo, o 12-16 con 2 estímulos.'},
 {id:'terciaria',lbl:'Terciaria',cls:'t-terciaria',band:[2,3],est:'1',land:'VM a VME',note:'Mantenimiento; libera recursos de recuperación.'}
];
const REF_MPHASES=[['acumulacion','Acumulación'],['mantenimiento','Mantenimiento'],['regeneracion','Regeneración / descarga']];
/* La tolerancia al volumen sube con la experiencia: el principiante crece en la parte baja del rango. */
function refLevelBand(band,exp){
 const lo=band[0],hi=band[1],span=hi-lo;
 if(span<=1)return[lo,hi];
 if(exp==='principiante')return[lo,Math.round(lo+span*0.5)];
 if(exp==='avanzado')return[Math.round(lo+span*0.5),hi];
 return[Math.round(lo+span*0.25),Math.round(lo+span*0.75)];
}
/* La fase modula el volumen: descarga reduce 30-70%; acumulación y mantenimiento conservan la banda (cambia el RIR). */
function refPhaseBand(band,exp,phase){
 const b=refLevelBand(band,exp);
 if(phase==='regeneracion')return[Math.max(2,Math.round(b[0]*0.4)),Math.max(3,Math.round(b[1]*0.55))];
 return b;
}

   cells+='<td class="cell '+pr.cls+'"><div class="vv">'+vol+'</div><div class="uu">series/sem</div><div class="rr">RIR <b>'+rir+'</b> · '+pr.est+'×</div></td>';

 });

  mantenimiento:'El volumen se mantiene y se incrementa la proximidad al fallo (baja el RIR). No se añaden series.',

 return '<div class="card"><h3>Matriz teórica de volumen <span class="hint">series semanales por grupo · prioridad × nivel × fase</span></h3>'+

}

/* volumen semanal por grupo muscular general */
function muscleVolume(aid){
  const direct={},indirect={};
  athData(aid).routine.days.forEach(day=>day.exercises.forEach(e2=>{
    const l=e2.libId?libById(e2.libId):null;const sets=parseInt(e2.sets,10)||0;
    if(!l||!sets)return;
    direct[l.group]=(direct[l.group]||0)+sets;
    (l.secondary||[]).forEach(m=>{indirect[m]=(indirect[m]||0)+sets;});
  }));
  return GROUPS.map(m=>({m,d:direct[m]||0,i:indirect[m]||0})).filter(x=>x.d||x.i).sort((a,b)=>(b.d-a.d)||(b.i-a.i));
}
/* cobertura del rompecabezas: qué categorías de cada grupo están trabajadas y cuáles faltan */
function catCoverage(aid){
  const acc={};
  athData(aid).routine.days.forEach(day=>day.exercises.forEach(e2=>{
    const l=e2.libId?libById(e2.libId):null;const sets=parseInt(e2.sets,10)||0;
    if(!l||!sets)return;
    const a=acc[l.group]||(acc[l.group]={cats:{},focus:{}});
    if(l.cat)a.cats[l.cat]=(a.cats[l.cat]||0)+sets;
    if(l.focus)a.focus[l.focus]=(a.focus[l.focus]||0)+sets;
  }));
  return GROUPS.filter(g=>acc[g]&&(GROUP_CATS[g]||[]).length).map(g=>({g,defined:GROUP_CATS[g],cats:acc[g].cats,focus:acc[g].focus}));
}

/* ===== SEGUIMIENTO SEMANA A SEMANA (ajustes, snapshots de volumen y cierre de bloque) ===== */
function volMap(aid){const o={};muscleVolume(aid).forEach(v=>{if(v.d)o[v.m]=v.d;});return o;}
function weekOf(aid){
  const r=athData(aid).routine;
  const days=Math.floor((Date.parse(todayISO())-Date.parse(r.startDate||todayISO()))/86400000);
  return Math.max(1,Math.floor(days/7)+1);
}
function ensureProgression(st){
  Object.keys(st.athletes).forEach(aid=>{
    const r=st.athletes[aid].routine;
    if(!r.startDate)r.startDate=todayISO();
    if(!r.changelog)r.changelog=[];
    if(!r.history)r.history=[];
    if(!r.snapshots)r.snapshots=[];
    if(!r.baseline)r.baseline={date:r.startDate,byGroup:volMap(aid)};
    r.days.forEach(day=>{if(!day.plan)day.plan={};});
    const lg=st.athletes[aid].logs;if(lg&&!lg.fatigue)lg.fatigue=[];
    /* rellena el resumen de bloques cerrados antes de esta versión */
    (r.history||[]).forEach(h=>{if(!h.summary){try{h.summary=summaryFromHistory(aid,h);}catch(e){}}});
  });
}
function snapshotWeek(aid){
  const r=athData(aid).routine,w=weekOf(aid),m=volMap(aid);
  const ex=r.snapshots.find(s=>s.week===w);
  if(ex){ex.byGroup=m;ex.date=todayISO();}
  else r.snapshots.push({week:w,date:todayISO(),byGroup:m});
  r.snapshots.sort((a,b)=>a.week-b.week);
}
function logChange(aid,type,detail,dayName,exName){
  const r=athData(aid).routine;
  if(!r.changelog)ensureProgression(S);
  r.changelog.push({id:uid(),date:todayISO(),week:weekOf(aid),type,detail:detail||'',day:dayName||'',ex:exName||''});
  snapshotWeek(aid);
}
function exDiff(o,n){
  const parts=[];
  if(String(o.name)!==String(n.name))parts.push('Ejercicio: '+o.name+' → '+n.name);
  if(String(o.sets)!==String(n.sets))parts.push('Series '+o.sets+'→'+n.sets);
  if(String(o.reps)!==String(n.reps))parts.push('Reps '+o.reps+'→'+n.reps);
  if(String(o.rir)!==String(n.rir))parts.push('RIR '+o.rir+'→'+n.rir);
  if(String(o.rest)!==String(n.rest))parts.push('Descanso '+o.rest+'→'+n.rest);
  return parts.join(' · ');
}
/* volumen por grupo "vigente" en una semana dada: último snapshot ≤ semana, si no, el inicial */
function volAtWeek(r,w){
  let best=null;
  (r.snapshots||[]).forEach(s=>{if(s.week<=w&&(!best||s.week>best.week))best=s;});
  return best?best.byGroup:((r.baseline||{}).byGroup||{});
}
const CHG_BADGE={alta:['green','Alta'],baja:['red','Baja'],ajuste:['blue','Ajuste']};

/* ===== TASA DE CAMBIO DE PESO (regresión lineal sobre la ventana) =====
   El ritmo objetivo se expresa como % del peso corporal por semana, por fase.
   Referencias: Helms et al. (déficit ~0,5-1%/sem preserva masa); superávit magro ~0,25-0,5%/sem. */
const RATE_TARGET={
 perdida:{lo:-1.0,hi:-0.5,dir:-1,lbl:'Pérdida de grasa'},
 acumulacion:{lo:0.10,hi:0.50,dir:1,lbl:'Ganancia muscular (superávit)'},
 introduccion:{lo:0.0,hi:0.40,dir:1,lbl:'Inicio de volumen'},
 mantenimiento:{lo:-0.25,hi:0.25,dir:0,lbl:'Mantenimiento'},
 regeneracion:{lo:-0.35,hi:0.20,dir:0,lbl:'Descarga / regeneración'}
};
function _mean(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;}
function weightStats(aid,days){
  days=days||28;
  const w=athData(aid).logs.weight.slice().sort((a,b)=>a.date<b.date?-1:1);
  if(w.length<2)return null;
  const cutoff=daysAgoISO(days);
  let pts=w.filter(x=>x.date>=cutoff);
  if(pts.length<2)pts=w.slice(-2);
  const t0=Date.parse(pts[0].date);
  const xs=pts.map(p=>(Date.parse(p.date)-t0)/86400000), ys=pts.map(p=>p.kg);
  const n=xs.length, mx=_mean(xs), my=_mean(ys);
  let num=0,den=0;for(let i=0;i<n;i++){num+=(xs[i]-mx)*(ys[i]-my);den+=(xs[i]-mx)*(xs[i]-mx);}
  const slope=den?num/den:0;                 /* kg/día */
  const kgWk=+(slope*7).toFixed(2);
  const cur=ys[ys.length-1];
  const fitStart=my+slope*(xs[0]-mx), fitCur=my+slope*(xs[xs.length-1]-mx);
  const pctWk=+(kgWk/(cur||1)*100).toFixed(2);
  return {kgWk,pctWk,slope,cur,fitStart,fitCur,nPts:n,spanDays:Math.round(xs[xs.length-1]-xs[0]),pts};
}
/* Objetivo de ritmo: usa el del plan (déficit/superávit fijado por el coach) si existe; si no, el de la fase. */
function targetRateFor(aid){
  const p=athData(aid).profile;
  if(p.targetRatePct!=null&&!isNaN(+p.targetRatePct)){
    const r=+p.targetRatePct, tol=Math.max(0.12,Math.abs(r)*0.4);
    return {lo:+(r-tol).toFixed(2),hi:+(r+tol).toFixed(2),dir:r<-0.05?-1:r>0.05?1:0,lbl:'Objetivo del plan ('+(r>0?'+':'')+r+'%/sem)',src:'plan'};
  }
  return Object.assign({src:'fase'},RATE_TARGET[p.phase]||RATE_TARGET.mantenimiento);
}
function rateVerdict(tgt,pctWk,kgWk){
  let v;
  if(tgt.dir===0)v=Math.abs(pctWk)<=0.25?{cls:'green',txt:'Peso estable, como busca el mantenimiento'}:{cls:'orange',txt:(kgWk>0?'Subiendo':'Bajando')+' más de lo previsto para mantenimiento'};
  else if(pctWk>=tgt.lo-0.05&&pctWk<=tgt.hi+0.05)v={cls:'green',txt:'Dentro del ritmo objetivo'+(tgt.src==='plan'?' del plan':' de la fase')};
  else if(tgt.dir<0){ v = pctWk>tgt.hi ? {cls:'orange',txt:'Lento o estancado para una fase de pérdida'} : {cls:'red',txt:'Demasiado rápido — riesgo de perder masa muscular'}; }
  else { v = pctWk<tgt.lo ? {cls:'orange',txt:'Por debajo del objetivo — poca ganancia'} : {cls:'red',txt:'Demasiado rápido — exceso de ganancia de grasa'}; }
  v.tgt=tgt;return v;
}
function svgWeightTrend(st){
  const pts=st.pts,H=200,W=560,padL=46,padR=16,padT=18,padB=26;
  const ys=pts.map(p=>p.kg);let min=Math.min(...ys,st.fitStart,st.fitCur),max=Math.max(...ys,st.fitStart,st.fitCur);
  if(max-min<1){max+=.5;min-=.5;}
  const span=max-min,iw=W-padL-padR,ih=H-padT-padB;
  const X=i=>padL+(pts.length===1?iw/2:i/(pts.length-1)*iw), Y=v=>padT+ih-((v-min)/span*ih);
  let raw='',dots='';
  pts.forEach((p,i)=>{raw+=(i?'L':'M')+X(i).toFixed(1)+','+Y(p.kg).toFixed(1);dots+='<circle cx="'+X(i)+'" cy="'+Y(p.kg)+'" r="2.6" fill="#11141a" stroke="#7cd0fb" stroke-width="1.6"/>';});
  const trend='M'+X(0)+','+Y(st.fitStart).toFixed(1)+'L'+X(pts.length-1)+','+Y(st.fitCur).toFixed(1);
  let grid='',labels='';
  for(let i=0;i<=2;i++){const v=min+span*i/2,y=Y(v);grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#232a36"/>';labels+='<text x="'+(padL-7)+'" y="'+(y+4)+'" text-anchor="end" font-size="10.5" fill="#8a96a8">'+v.toFixed(1)+'</text>';}
  const step=Math.max(1,Math.ceil(pts.length/6));let xl='';pts.forEach((p,i)=>{if(i%step===0||i===pts.length-1)xl+='<text x="'+X(i)+'" y="'+(H-7)+'" text-anchor="middle" font-size="10.5" fill="#8a96a8">'+fmtDate(p.date)+'</text>';});
  const col=st.kgWk<0?'#7cd0fb':st.kgWk>0?'#ffb45c':'#52d98a';
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+grid+'<path d="'+raw+'" fill="none" stroke="#3a4452" stroke-width="1.5" stroke-dasharray="2 3"/>'+dots+'<path d="'+trend+'" fill="none" stroke="'+col+'" stroke-width="2.6" stroke-linecap="round"/>'+labels+xl+'</svg></div><p class="tiny" style="text-align:right;margin:-6px 4px 0">— línea de tendencia (regresión) · puntos = pesajes</p>';
}
function weightTrendCard(aid){
  const d=athData(aid),p=d.profile,lw=lastWeight(aid);

  if(!st||!lw)return '<div class="card mb16"><h3>Tasa de cambio de peso</h3><div class="empty"><b>Faltan pesajes</b>Se necesitan al menos 2 registros de peso para calcular la tasa.</div></div>';

  const fuenteTxt=tgt.src==='plan'?'el déficit/superávit fijado en el plan de nutrición':'la fase «'+phaseName(p.phase)+'» (fija un objetivo en Nutrición para afinarlo)';
  return '<div class="card mb16"><div class="sect-h" style="margin:0 0 12px"><h3 style="margin:0">Tasa de cambio de peso <span class="hint">tendencia de los últimos '+st.spanDays+' días · '+st.nPts+' pesajes</span></h3></div>'+
    '<div class="grid g4 mb16">'+
    '<div class="stat"><div class="k">Ritmo actual</div><div class="v '+(arrow==='up'?'up':arrow==='down'?'down':'')+'">'+sign(st.kgWk)+'<small> kg/sem</small></div><div class="sub">'+sign(st.pctWk)+' %/sem del peso</div></div>'+
    '<div class="stat"><div class="k">'+(tgt.src==='plan'?'Objetivo del plan':'Objetivo de la fase')+'</div><div class="v" style="font-size:16px">'+esc(tgt.lbl)+'</div><div class="sub">'+bandTxt+'</div></div>'+
    '<div class="stat"><div class="k">Proyección 4 sem</div><div class="v">'+sign(+(st.kgWk*4).toFixed(1))+'<small> kg</small></div><div class="sub">si mantiene el ritmo</div></div>'+
    '<div class="stat"><div class="k">Estado</div><div class="v" style="font-size:15px"><span class="badge '+v.cls+'">'+(v.cls==='green'?'En objetivo':v.cls==='orange'?'Ajustar':'Atención')+'</span></div><div class="sub">'+esc(v.txt)+'</div></div></div>'+
    svgWeightTrend(st)+
    '<p class="tiny mt8">La tasa se calcula por regresión lineal (no por el último pesaje suelto), así filtra el ruido diario de agua/glucógeno. La banda objetivo deriva de '+esc(fuenteTxt)+'. '+(v.cls!=='green'?'<b style="color:var(--'+(v.cls==='red'?'red':'orange')+')">Sugerencia:</b> '+(tgt.dir<0?(v.cls==='red'?'sube ~100-150 kcal para frenar la bajada y proteger la masa magra.':'baja ~100-150 kcal o sube pasos para reactivar la pérdida.'):(v.cls==='red'?'recorta ~100-150 kcal para limitar la grasa ganada.':'añade ~100-150 kcal para asegurar el estímulo de crecimiento.')):'Mantén el plan; el ritmo es adecuado.')+'</p></div>';
}

/* ===== RESUMEN DE BLOQUE (para cerrar fase/bloque y comparar) ===== */
function blockSummary(aid,startISO,endISO){
  const d=athData(aid),r=d.routine;
  endISO=endISO||todayISO();startISO=startISO||r.startDate||endISO;
  const days=Math.max(1,daysBetweenISO(startISO,endISO)),weeks=Math.max(1,Math.round(days/7));
  const inR=arr=>(arr||[]).filter(x=>x.date>=startISO&&x.date<=endISO);
  const W=inR(d.logs.weight).slice().sort((a,b)=>a.date<b.date?-1:1);
  let wStart=null,wEnd=null,wDelta=null,kgWk=null,pctWk=null;
  if(W.length>=1){wStart=W[0].kg;wEnd=W[W.length-1].kg;}
  if(W.length>=2){wDelta=+(wEnd-wStart).toFixed(1);const wkSpan=(daysBetweenISO(W[0].date,W[W.length-1].date)/7)||1;kgWk=+(wDelta/wkSpan).toFixed(2);pctWk=+(kgWk/(wEnd||1)*100).toFixed(2);}
  const wk=inR(d.logs.workouts), rpes=wk.map(x=>x.rpe).filter(x=>x!=null);
  const adh=inR(d.logs.nutrition).map(x=>x.adherence).filter(x=>x!=null);
  const fat=inR(d.logs.fatigue).map(x=>x.total).filter(x=>x!=null);
  const volInit=(r.baseline&&r.baseline.byGroup)?Object.values(r.baseline.byGroup).reduce((a,b)=>a+b,0):0;
  const volNow=Object.values(volMap(aid)).reduce((a,b)=>a+b,0);
  const m=a=>a.length?+_mean(a).toFixed(1):null;
  return {startISO,endISO,days,weeks,wStart,wEnd,wDelta,kgWk,pctWk,
    workouts:wk.length,workoutsPerWk:+(wk.length/weeks).toFixed(1),
    avgRpe:m(rpes),avgAdh:m(adh),avgFatigue:m(fat),
    volInit,volNow,volDelta:volNow-volInit};
}
/* Reconstruye el resumen de un bloque ya archivado (para los cerrados antes de esta versión). */
function summaryFromHistory(aid,h){
  const s=blockSummary(aid,h.startDate,h.endDate);
  s.volInit=Object.values((h.baseline&&h.baseline.byGroup)||{}).reduce((a,b)=>a+b,0);
  s.volNow=Object.values(h.final||{}).reduce((a,b)=>a+b,0);
  s.volDelta=s.volNow-s.volInit;
  return s;
}

/* ===== GENERADOR DE SPLIT AUTOMÁTICO (estructura + ejercicios) ===== */
const REGION_GROUPS={
 push:['Pectoral','Deltoide anterior','Deltoide lateral','Tríceps'],
 pull:['Espalda','Trapecio','Deltoide posterior','Bíceps','Antebrazo'],
 legs:['Cuádriceps','Isquiosurales','Glúteo','Aductores','Gemelo / Sóleo','Abdomen'],
 upper:['Pectoral','Espalda','Trapecio','Deltoide anterior','Deltoide lateral','Deltoide posterior','Bíceps','Tríceps','Antebrazo'],
 lower:['Cuádriceps','Isquiosurales','Glúteo','Aductores','Gemelo / Sóleo','Abdomen'],
 full:GROUPS.slice()
};
const SPLIT_STYLES=[['auto','Recomendado (según días)'],['fb','Full body'],['ul','Torso / Pierna'],['ppl','Empuje / Tracción / Pierna']];
function splitCycle(nDays,seq){
  const t=[];const rounds=Math.ceil(nDays/seq.length);
  for(let i=0;i<nDays;i++){const b=seq[i%seq.length];const suf=(rounds>1)?' '+String.fromCharCode(65+Math.floor(i/seq.length)):'';t.push({name:b.name+suf,region:b.region});}
  return t;
}
function splitTemplate(nDays,exp,style){
  style=style||'auto';
  if(style==='fb')return splitCycle(nDays,[{name:'Full body',region:'full'}]);
  if(style==='ul')return splitCycle(nDays,[{name:'Torso',region:'upper'},{name:'Pierna',region:'lower'}]);
  if(style==='ppl')return splitCycle(nDays,[{name:'Empuje',region:'push'},{name:'Tracción',region:'pull'},{name:'Pierna',region:'legs'}]);
  /* auto: elige por días y experiencia */
  const fb=n=>{const a=[];for(let i=0;i<n;i++)a.push({name:'Full body '+(i+1),region:'full'});return a;};
  if(nDays<=1)return [{name:'Full body',region:'full'}];
  if(exp==='principiante'&&nDays<=3)return fb(nDays);
  if(nDays===2)return [{name:'Torso',region:'upper'},{name:'Pierna',region:'lower'}];
  if(nDays===3)return [{name:'Empuje',region:'push'},{name:'Tracción',region:'pull'},{name:'Pierna',region:'legs'}];
  if(nDays===4)return [{name:'Torso A',region:'upper'},{name:'Pierna A',region:'lower'},{name:'Torso B',region:'upper'},{name:'Pierna B',region:'lower'}];
  if(nDays===5)return [{name:'Empuje',region:'push'},{name:'Tracción',region:'pull'},{name:'Pierna',region:'legs'},{name:'Torso',region:'upper'},{name:'Pierna / puntos débiles',region:'lower'}];
  if(nDays===6)return [{name:'Empuje A',region:'push'},{name:'Tracción A',region:'pull'},{name:'Pierna A',region:'legs'},{name:'Empuje B',region:'push'},{name:'Tracción B',region:'pull'},{name:'Pierna B',region:'legs'}];
  const t=[{name:'Empuje A',region:'push'},{name:'Tracción A',region:'pull'},{name:'Pierna A',region:'legs'},{name:'Empuje B',region:'push'},{name:'Tracción B',region:'pull'},{name:'Pierna B',region:'legs'}];
  for(let i=7;i<=nDays;i++)t.push({name:'Full body '+(i-6),region:'full'});
  return t;
}
function repsForCat(cat){
  if(cat==='I')return{reps:'6-10',rest:'2-3 min'};
  if(cat==='II')return{reps:'8-12',rest:'2 min'};
  if(cat==='III')return{reps:'12-15',rest:'90 s'};
  return{reps:'12-20',rest:'75 s'};
}
function pickExercisesForGroup(g,totalSets,maxEx){
  const lib=(S.library||[]).filter(l=>l.group===g);
  if(!lib.length)return [];
  const byCat={};lib.forEach(l=>{const k=l.cat||'?';(byCat[k]=byCat[k]||[]).push(l);});
  const catOrder=ROMAN.filter(c=>byCat[c]);if(byCat['?'])catOrder.push('?');
  const nEx=Math.max(1,Math.min(maxEx||3,Math.round(totalSets/3.5)||1));
  const chosen=[];let guard=0;
  while(chosen.length<nEx&&guard<40){const c=catOrder[chosen.length%catOrder.length];const pool=(byCat[c]||[]).filter(l=>chosen.indexOf(l)<0);if(pool.length)chosen.push(pool[0]);guard++;if(chosen.length>=lib.length)break;}
  if(!chosen.length)chosen.push(lib[0]);
  const base=Math.floor(totalSets/chosen.length);let rem=totalSets-base*chosen.length;
  return chosen.map(l=>{const sets=Math.max(1,base+(rem>0?1:0));if(rem>0)rem--;return{lib:l,sets};});
}
function autoSplit(aid,nDays,style){
  const d=athData(aid),p=d.profile,r=d.routine;
  nDays=nDays||r.days.length||4;
  /* asegura objetivos de volumen */
  p.volTargets=p.volTargets||{};
  let anyTgt=GROUPS.some(g=>p.volTargets[g]!=null&&p.volTargets[g]!==''&&p.priorities[g]!==0);
  if(!anyTgt){GROUPS.forEach(g=>{const prio=p.priorities[g];if(prio===0){delete p.volTargets[g];return;}const rec=volumeRec(g,p.experience,p.phase,p.block,prio);if(rec)p.volTargets[g]=rec.target;});}
  const tpl=splitTemplate(nDays,p.experience,style);
  const days=tpl.map(t=>({id:uid(),name:t.name,region:t.region,exercises:[],plan:{}}));
  /* reparte el objetivo semanal de cada grupo entre los días cuya región lo incluye */
  const load=days.map(()=>0);
  GROUPS.filter(g=>{const t=p.volTargets[g];return t!=null&&t!==''&&(+t)>0&&p.priorities[g]!==0;})
    .sort((a,b)=>(+p.volTargets[b])-(+p.volTargets[a]))
    .forEach(g=>{
      const T=+p.volTargets[g];
      const allowed=days.map((dy,i)=>i).filter(i=>REGION_GROUPS[days[i].region].indexOf(g)>=0);
      if(!allowed.length)return;
      let f=Math.round(T/8)||1;f=Math.max(f,Math.ceil(T/10));f=Math.min(f,Math.max(1,Math.floor(T/4))||1);
      if(T>=6&&allowed.length>=2)f=Math.max(2,f);f=Math.max(1,Math.min(f,allowed.length));
      const idx=allowed.slice().sort((a,b)=>load[a]-load[b]||a-b).slice(0,f).sort((a,b)=>a-b);
      const base=Math.floor(T/f);let rem=T-base*f;
      idx.forEach(i=>{const vv=base+(rem>0?1:0);if(rem>0)rem--;if(vv>0){days[i].plan[g]=vv;load[i]+=vv;}});
    });
  /* selecciona ejercicios para cubrir el plan de cada día */
  const rir=rirFor(p.phase,p.experience);
  let exCount=0;
  days.forEach(dy=>{
    /* orden de grupos: compuestos grandes primero */
    const order=['Cuádriceps','Glúteo','Isquiosurales','Pectoral','Espalda','Deltoide anterior','Deltoide lateral','Deltoide posterior','Trapecio','Tríceps','Bíceps','Antebrazo','Aductores','Gemelo / Sóleo','Abdomen'];
    /* tope de ejercicios por sesión: menos por grupo cuando el día concentra muchos grupos */
    const nGroups=Object.keys(dy.plan).filter(g=>dy.plan[g]>0).length;
    const maxEx=nGroups>=7?1:nGroups>=5?2:3;
    Object.keys(dy.plan).sort((a,b)=>order.indexOf(a)-order.indexOf(b)).forEach(g=>{
      const tot=dy.plan[g];if(!tot)return;
      pickExercisesForGroup(g,tot,maxEx).forEach(pe=>{
        const rc=repsForCat(pe.lib.cat);
        dy.exercises.push({id:uid(),name:pe.lib.name,sets:pe.sets,reps:rc.reps,rir:rir,rest:rc.rest,notes:'',libId:pe.lib.id});
        exCount++;
      });
    });
    delete dy.region;
  });
  r.days=days;
  r.startDate=r.startDate||todayISO();
  r.baseline={date:todayISO(),byGroup:volMap(aid)};
  r.changelog=r.changelog||[];r.snapshots=r.snapshots||[];
  logChange(aid,'alta','Split automático generado ('+nDays+' días, '+exCount+' ejercicios)','Programa','');
  return {days:days.length,exercises:exCount,template:tpl.map(t=>t.name).join(' · ')};
}

/* ===== GENERADOR DE NUTRICIÓN AUTOMÁTICA (objetivos + comidas con alimentos) ===== */
function gramsFor(food,key,targetMacro){const per=food[key];if(!per||per<=0)return 0;return Math.max(0,Math.round(targetMacro/(per/100)/5)*5);}
function foodPools(){
  const F=S.foods||[];
  return {
    prot:F.filter(x=>x.cat==='Proteínas').concat(F.filter(x=>x.cat==='Lácteos'&&x.p>=8)),
    carb:F.filter(x=>x.cat==='Carbohidratos').concat(F.filter(x=>x.cat==='Frutas')),
    fat:F.filter(x=>x.cat==='Grasas'),
    veg:F.filter(x=>x.cat==='Verduras')
  };
}
function buildAutoMeals(N,P,C,Fg){
  const pools=foodPools();const meals=[];const mp=P/N,mc=C/N,mf=Fg/N;
  for(let i=0;i<N;i++){
    const items=[];let uP=0,uC=0,uF=0;
    const addF=(fo,g)=>{if(!fo||g<=0)return;const m=foodMacros(fo.name,g);if(!m)return;items.push({food:fo.name,qty:g+' g',grams:g,p:m.p,c:m.c,f:m.f});uP+=m.p;uC+=m.c;uF+=m.f;};
    /* verdura fija (volumen y micros) en comidas alternas */
    if(pools.veg.length&&i%2===0){const vf=pools.veg[i%pools.veg.length];addF(vf,100);}
    /* grasa: cubre la grasa restante de la comida */
    if(pools.fat.length){const remF=mf-uF;if(remF>2){const ff=pools.fat[i%pools.fat.length];addF(ff,gramsFor(ff,'f',remF));}}
    /* carbohidrato: cubre el carbo restante */
    if(pools.carb.length){const remC=mc-uC;if(remC>3){const cf=pools.carb[i%pools.carb.length];addF(cf,gramsFor(cf,'c',remC));}}
    /* proteína al final: absorbe la proteína que falta y minimiza el exceso */
    if(pools.prot.length){const remP=mp-uP;if(remP>2){const pf=pools.prot[i%pools.prot.length];addF(pf,gramsFor(pf,'p',remP));}}
    meals.push({id:uid(),name:'Comida '+(i+1),time:'',items});
  }
  return meals;
}
function autoNutrition(aid){
  const d=athData(aid),p=d.profile,plan=activePlanOf(aid),lw=lastWeight(aid);
  const W=lw?lw.kg:0;
  if(!W)return{err:'No hay ningún pesaje registrado para este atleta.'};
  if(!p.heightCm)return{err:'Falta la altura del atleta (pestaña Resumen → perfil).'};
  const sex=p.sex||'M',A=p.age||25,H=p.heightCm,bf=p.bodyFat||0;
  const FFM=bf>0?+(W*(1-bf/100)).toFixed(1):0;
  const eqs=rmrEquations(W,H,A,sex,FFM);
  const rmrObj=eqs.tenhaaf||eqs.mifflin||eqs.delorenzo||eqs.harris;
  const rmr=rmrObj.val;
  const nd=d.routine.days.length;
  const pal=nd>=5?1.725:nd>=3?1.55:1.375;
  const tdee=Math.round(rmr*pal);
  const tgt=RATE_TARGET[p.phase]||RATE_TARGET.mantenimiento;
  let delta=0,goalTxt='Mantenimiento',pctUsed=0;
  if(tgt.dir<0){pctUsed=0.6;const kgWk=W*pctUsed/100;delta=-Math.round(kgWk*KCAL_PER_KG/7);goalTxt='Déficit · '+pctUsed+'%/sem';}
  else if(tgt.dir>0){pctUsed=0.3;const kgWk=W*pctUsed/100;delta=Math.round(kgWk*KCAL_PER_KG/7);goalTxt='Superávit · '+pctUsed+'%/sem';}
  const target=Math.max(1200,tdee+delta);
  const protRef=(FFM>0&&tgt.dir<0)?FFM:W;
  const protGkg=tgt.dir<0?2.2:2.0;
  const protein=Math.round(protGkg*protRef);
  const fat=Math.round(target*0.25/9);
  let carbs=Math.round((target-(protein*4+fat*9))/4);if(carbs<0)carbs=0;
  plan.kcal=target;plan.protein=protein;plan.carbs=carbs;plan.fat=fat;plan.mode='menu';
  p.targetRatePct=tgt.dir<0?-pctUsed:tgt.dir>0?pctUsed:0;
  const N=Math.max(1,plan.mealsPerDay||4);
  plan.meals=buildAutoMeals(N,protein,carbs,fat);
  plan.notes=(plan.notes?plan.notes+' ':'')+'[Plan autogenerado: '+goalTxt+', '+protGkg+' g/kg proteína. Ajusta gramos a tu gusto.]';
  return {tdee,rmr:rmrObj.name,pal,target,goalTxt,protein,carbs,fat,N,fromW:W};
}

    '<p class="tiny mt8">Al cerrar, el bloque se archiva (volumen inicial → final y todos los ajustes) y el volumen actual pasa a ser el inicial del siguiente. Así comparas bloque contra bloque al transicionar.</p></div>';
  /* --- comparación de volumen inicial → semanas → actual --- */
  const groups=GROUPS.filter(g=>base[g]||cur[g]);
  const allWeeks=[];for(let w2=1;w2<=week;w2++)allWeeks.push(w2);

  let vrows='';
  groups.forEach(g=>{
    const b=base[g]||0,c=cur[g]||0,delta=c-b;
    let prev=b,cells='';
    shown.forEach(w2=>{const v2=(volAtWeek(r,w2)[g])||0;cells+='<td class="wkcell'+(v2!==prev?' chg':'')+'">'+v2+'</td>';prev=v2;});
    const pill=delta===0?'<span class="delta-pill flat">=</span>':'<span class="delta-pill '+(delta>0?'up':'down')+'">'+(delta>0?'+':'')+delta+'</span>';
    vrows+='<tr><td class="exname">'+esc(g)+'</td><td class="num"><b>'+b+'</b></td>'+(gap?'<td class="tiny">…</td>':'')+cells+'<td class="num"><b>'+c+'</b></td><td>'+pill+'</td></tr>';
  });
  const volCard='<div class="card mb16"><h3>Volumen por grupo: inicial → actual <span class="hint">series directas/semana · celdas verdes = hubo cambio esa semana</span></h3>'+
    '<div class="tblwrap"><table class="tbl" style="min-width:520px"><thead>'+vh+'</thead><tbody>'+(vrows||'<tr><td class="tiny" colspan="9">Vincula ejercicios de la biblioteca para medir el volumen.</td></tr>')+'</tbody></table></div>'+
    '<p class="tiny mt8">«Inicial» es el volumen al arrancar el bloque; cada columna muestra el volumen vigente esa semana; «Δ» compara actual vs inicial. Al cerrar el bloque, el actual queda archivado como «final».</p></div>';
  /* --- historial de ajustes por semana --- */
  let chg='';
  const byWeek={};(r.changelog||[]).forEach(c=>{(byWeek[c.week]=byWeek[c.week]||[]).push(c);});
  Object.keys(byWeek).map(Number).sort((a,b)=>b-a).forEach(w2=>{
    chg+='<div class="sect-h" style="margin:14px 0 8px"><h2 style="font-size:14px">Semana '+w2+'</h2><span class="tiny">'+byWeek[w2].length+' cambio'+(byWeek[w2].length>1?'s':'')+'</span></div>';
    byWeek[w2].slice().reverse().forEach(c=>{
      const bd=CHG_BADGE[c.type]||['','Cambio'];
      chg+='<div class="logitem"><div class="lh"><span class="badge '+bd[0]+'">'+bd[1]+'</span><b>'+esc(c.ex||c.day)+'</b>'+(c.ex&&c.day?'<span class="tiny">'+esc(c.day)+'</span>':'')+'<span class="muted" style="font-size:12.5px">'+esc(c.detail)+'</span><span class="dt">'+fmtDateFull(c.date)+'</span></div></div>';
    });

  const chgCard='<div class="card mb16"><h3>Ajustes del bloque <span class="hint">qué, en qué ejercicio y en qué semana</span></h3>'+(chg||'<div class="empty"><b>Aún sin ajustes</b>Cada cambio de series, reps, RIR, altas y bajas de ejercicios se registrará aquí solo.</div>')+'</div>';
  /* --- bloques anteriores --- */
  let hist='';
  (r.history||[]).slice().reverse().forEach(h=>{
    const gs=GROUPS.filter(g=>(h.baseline.byGroup[g]||h.final[g]));
    let rows2='';gs.forEach(g=>{const b=h.baseline.byGroup[g]||0,f=h.final[g]||0,dl=f-b;
      rows2+='<tr><td class="exname">'+esc(g)+'</td><td class="num">'+b+'</td><td class="num"><b>'+f+'</b></td><td>'+(dl===0?'<span class="delta-pill flat">=</span>':'<span class="delta-pill '+(dl>0?'up':'down')+'">'+(dl>0?'+':'')+dl+'</span>')+'</td></tr>';});
    const sg=h.summary?summaryStatGrid(h.summary,h.phase):'';
    hist+='<div class="logitem" data-act="log-toggle"><div class="lh"><span class="badge volt">Bloque '+h.block+'</span><b>'+esc(phaseName(h.phase))+'</b><span class="tiny">'+esc(h.name||'')+'</span><span class="tiny">'+h.changes+' ajustes · clic para ver resumen</span><span class="dt">'+fmtDate(h.startDate)+' → '+fmtDate(h.endDate)+'</span></div>'+
    '<div class="logdetail">'+sg+'<h4 class="mg-h">Volumen por grupo: inicial → final</h4><div class="tblwrap"><table class="tbl" style="min-width:auto"><thead><tr><th>Grupo</th><th>Inicial</th><th>Final</th><th>Δ</th></tr></thead><tbody>'+rows2+'</tbody></table></div></div></div>';
  });
  const histCard=hist?'<div class="sect-h"><h2>Bloques anteriores</h2><span class="tiny">resumen + volumen inicial vs final — para decidir el siguiente bloque</span></div>'+hist:'';
  return head+blockCompareCard(aid)+acwrCard(aid)+fatigueCard(aid)+applyCard(aid)+volCard+chgCard+histCard;
}

      if(T>=6&&days.length>=2)f=Math.max(2,f);
      f=Math.max(1,Math.min(f,days.length));
      const idx=days.map((day,i)=>i).sort((a,b)=>load[a]-load[b]||a-b).slice(0,f).sort((a,b)=>a-b);
      const base=Math.floor(T/f);let rem=T-base*f;
      idx.forEach(i=>{const v=base+(rem>0?1:0);if(rem>0)rem--;if(v>0){days[i].plan[g]=v;load[i]+=v;}});
    });
    saveState();toast('Objetivos repartidos entre '+days.length+' sesiones');render();
  }
});

/* serie por sesión: carga + ACWR móvil (línea solo cuando hay base crónica suficiente) */
function acwrSeries(aid,metric,maxBars,minBase){
  const arr=athData(aid).logs.workouts.slice().filter(w=>sessLoad(w,metric)>0).sort((a,b)=>a.date<b.date?-1:1);
  if(!arr.length)return[];
  const first=arr[0].date;
  const out=arr.map(w=>{
    const D=w.date;let acute=0,chronic=0;
    arr.forEach(x=>{const diff=daysBetweenISO(x.date,D);if(diff>=0&&diff<7)acute+=sessLoad(x,metric);if(diff>=0&&diff<28)chronic+=sessLoad(x,metric);});
    const chronicWk=chronic/4;let acwr=chronicWk>0?acute/chronicWk:null;
    if(minBase&&daysBetweenISO(first,D)<minBase)acwr=null;
    return{date:D,load:Math.round(sessLoad(w,metric)),acwr:acwr!=null?+acwr.toFixed(2):null};
  });
  return maxBars?out.slice(-maxBars):out;
}
/* gráfica de doble eje: barras = carga (eje izq.) · línea = ACWR (eje der. 0-1,5) + umbrales bajo/alto */
function acwrComboChart(series,opts){
  opts=opts||{};const unit=opts.unit||'UA',W=720,H=300,padL=50,padR=50,padT=18,padB=44;
  if(!series||series.length<2)return'<div class="empty"><b>Aún no hay datos suficientes</b>Se necesitan al menos 2 sesiones con carga registrada (RPE y duración).</div>';
  const iw=W-padL-padR,ih=H-padT-padB;
  const loads=series.map(s=>s.load),maxLoad=Math.max.apply(null,loads.concat(1));
  const leftMax=Math.max(250,Math.ceil(maxLoad/250)*250);
  const acwrs=series.map(s=>s.acwr).filter(v=>v!=null),maxA=acwrs.length?Math.max.apply(null,acwrs):1.5;
  const rightMax=maxA>1.5?Math.ceil(maxA*2)/2:1.5,n=series.length,slotW=iw/n;
  const YL=v=>padT+ih-(v/leftMax)*ih,YR=v=>padT+ih-(Math.min(v,rightMax)/rightMax)*ih,cx=i=>padL+i*slotW+slotW/2;
  let bandRect='';if(opts.band){const _hi=Math.min(opts.band.hi,rightMax),yT=YR(_hi),yB=YR(opts.band.lo);bandRect='<rect x="'+padL+'" y="'+yT.toFixed(1)+'" width="'+iw+'" height="'+Math.max(0,yB-yT).toFixed(1)+'" fill="rgba(82,217,138,.10)"/>'+(opts.bandLabel?'<text x="'+(padL+6)+'" y="'+(yT+12).toFixed(1)+'" font-size="9.5" fill="#52d98a">objetivo · '+opts.bandLabel+'</text>':'');}
  let grid='',llab='';for(let i=0;i<=5;i++){const v=leftMax*i/5,y=YL(v);grid+='<line x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+y.toFixed(1)+'" stroke="#232a36" stroke-width="1"/>';llab+='<text x="'+(padL-7)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" font-size="10.5" fill="#8a96a8">'+Math.round(v)+'</text>';}
  let rlab='';const steps=Math.round(rightMax/0.5);for(let i=0;i<=steps;i++){const v=i*0.5,y=YR(v);rlab+='<text x="'+(W-padR+7)+'" y="'+(y+4).toFixed(1)+'" font-size="10.5" fill="#8a96a8">'+v.toFixed(1)+'</text>';}
  let bars='';series.forEach((s,i)=>{const x=padL+i*slotW+slotW*0.20,bw=slotW*0.60,y=YL(s.load);bars+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+(padT+ih-y).toFixed(1)+'" rx="2" fill="rgba(124,208,251,.40)" stroke="rgba(124,208,251,.75)" stroke-width="1"/>';});
  const yLow=YR(0.8),yHigh=YR(1.5);
  const thr='<line x1="'+padL+'" y1="'+yLow.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yLow.toFixed(1)+'" stroke="#52d98a" stroke-width="1.3" stroke-dasharray="5 4"/><line x1="'+padL+'" y1="'+yHigh.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yHigh.toFixed(1)+'" stroke="#ff7066" stroke-width="1.3" stroke-dasharray="5 4"/>';
  let path='',dots='',started=false;series.forEach((s,i)=>{if(s.acwr==null)return;const x=cx(i),y=YR(s.acwr);path+=(started?'L':'M')+x.toFixed(1)+','+y.toFixed(1);started=true;dots+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="3" fill="#0b0d11" stroke="#cdf563" stroke-width="2"/>';});
  const line=path?'<path d="'+path+'" fill="none" stroke="#cdf563" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>'+dots:'';
  const step=Math.max(1,Math.ceil(n/9));let xlab='';series.forEach((s,i)=>{if(i%step===0||i===n-1)xlab+='<text x="'+cx(i).toFixed(1)+'" y="'+(H-22)+'" text-anchor="middle" font-size="9.5" fill="#8a96a8">'+fmtDate(s.date)+'</text>';});
  const axT='<text x="'+padL+'" y="'+(padT-5)+'" font-size="10" fill="#9aa5b6">Carga ('+unit+')</text><text x="'+(W-padR)+'" y="'+(padT-5)+'" text-anchor="end" font-size="10" fill="#9aa5b6">ACWR</text>';
  const legend='<div class="muschips" style="margin-top:8px;gap:14px"><span class="tiny"><span style="display:inline-block;width:11px;height:11px;background:rgba(124,208,251,.5);border:1px solid rgba(124,208,251,.75);border-radius:2px;vertical-align:-1px;margin-right:5px"></span>Carga de entrenamiento ('+unit+')</span><span class="tiny"><span style="display:inline-block;width:16px;border-top:2.4px solid #cdf563;vertical-align:4px;margin-right:5px"></span>ACWR</span><span class="tiny"><span style="display:inline-block;width:16px;border-top:2px dashed #52d98a;vertical-align:4px;margin-right:5px"></span>Bajo (0,8)</span><span class="tiny"><span style="display:inline-block;width:16px;border-top:2px dashed #ff7066;vertical-align:4px;margin-right:5px"></span>Alto (1,5)</span></div>';
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+grid+bandRect+axT+bars+thr+line+llab+rlab+xlab+'</svg></div>'+legend;
}
/* contextualización por fase (Acumulación 0,8→1,3 · Mantenimiento 1,3–1,5 · Regeneración ≤0,8) */
function acwrPhaseBand(phase){
  if(phase==='mantenimiento')return{lo:1.3,hi:1.5,lbl:'Mantenimiento',rng:'1,3–1,5'};
  if(phase==='regeneracion')return{lo:0,hi:0.8,lbl:'Regeneración',rng:'≤ 0,8'};
  return{lo:0.8,hi:1.3,lbl:'Acumulación',rng:'0,8–1,3'};
}
function acwrPhaseVerdict(r,phase){
  const b=acwrPhaseBand(phase);
  if(r==null)return{cls:'',txt:'Aún sin ratio calculable; se necesita base crónica.'};
  if(r<b.lo)return{cls:'blue',txt:'Previsto '+b.rng+'. Estás por debajo: '+(phase==='regeneracion'?'coherente con la descarga.':'hay margen para progresar la carga gradualmente.')};
  if(r>b.hi)return{cls:'orange',txt:'Previsto '+b.rng+'. Estás por encima: '+(phase==='regeneracion'?'en regeneración la tasa debería caer por debajo de 0,8.':'no progreses métricas ni exigencias hasta volver al rango.')};
  return{cls:'green',txt:'Previsto '+b.rng+'. Dentro del rango — mantén la aproximación gradual bloque a bloque.'};
}

   const perf=parseInt(val('fq_perf'),10)||2;
   const e={id:uid(),date:todayISO(),week:weekOf(u.id),g,gs,gl:fqGlobalLevel(gs),loc,rpe,rl:fqRpeLevel(rpe),perf,injRaw,risk:fqRiskLevel(injRaw),comment:val('fq_c')};
   e.total=e.gl+e.loc+e.rl+e.perf+e.risk;
   const logs=fatigueLogs(u.id);
   const i=logs.findIndex(x=>x.week===e.week);
   if(i>=0)logs[i]=e;else logs.push(e);
   logs.sort((a,b)=>a.week-b.week);
   saveState();closeModal();toast('Check-in guardado — puntaje '+e.gs+'/25');render();
 }
});

/* ===== APLICACIÓN DE LA DECISIÓN SEMANAL (primarios y máximos · duración y RPE por sesión) ===== */
function parseRestMin(r){
  const m=String(r||'').match(/(\d+(?:[.,]\d+)?)(?:\s*[-–a]\s*(\d+(?:[.,]\d+)?))?/);
  if(!m)return 2;
  let v=parseFloat(m[1].replace(',','.'));
  if(m[2])v=(v+parseFloat(m[2].replace(',','.')))/2;
  const txt=String(r).toLowerCase();
  if(/min/.test(txt))return v;
  if(/\ds|s\b|seg/.test(txt))return v/60;
  return v>15?v/60:v;
}
function estSessionMin(day){
  let t=0;
  day.exercises.forEach(e=>{const sets=parseInt(e.sets,10)||0;t+=sets*(0.75+parseRestMin(e.rest));});
  return Math.round(t);
}
function realSessionStats(aid,dayId){
  const ws=athData(aid).logs.workouts.filter(w=>w.dayId===dayId&&(w.dur||w.rpe)).slice(-3);
  if(!ws.length)return{n:0};
  const durs=ws.filter(w=>w.dur),rpes=ws.filter(w=>w.rpe);
  return{n:ws.length,
    dur:durs.length?Math.round(durs.reduce((a,w)=>a+w.dur,0)/durs.length):null,
    rpe:rpes.length?+(rpes.reduce((a,w)=>a+w.rpe,0)/rpes.length).toFixed(1):null};
}
function applyCard(aid){
  const d=athData(aid),p=d.profile,last=fatigueLast(aid);
  const dec=last?fqDecision(last.total):null;
  const elig=GROUPS.filter(g=>p.priorities[g]===4||p.priorities[g]===1).sort((a,b)=>(p.priorities[a]===4?0:1)-(p.priorities[b]===4?0:1));
  let inner='';
  if(!elig.length)inner='<div class="empty"><b>Sin músculos primarios o máximos</b>El incremento o la reducción semanal aplica a las prioridades altas; asígnalas en «Volumen y fase».</div>';
  else{
    if(!dec)inner+='<p class="muted" style="margin-bottom:12px">Aún sin check-in de fatiga esta semana — ajusta con tu criterio de coach; cada cambio queda registrado.</p>';
    else if(dec.k==='manten')inner+='<div class="notebox" style="margin-bottom:12px">La recomendación es <b>no incrementar</b> (mantén series y progresa con reps/carga). La decisión final es tuya: conoces a tu atleta, y cualquier ajuste que hagas aquí queda registrado.</div>';
    elig.forEach(g=>{
      const cur=volMap(aid)[g]||0;
      const sug=!dec||dec.k==='manten'?cur:dec.k==='sube2'?(cur+2):dec.k==='sube1'?(cur+1):Math.max(0,Math.round(cur*0.85));
      let rows='';
      d.routine.days.forEach((day,di)=>{
        const exs=day.exercises.filter(e=>{const l=e.libId?libById(e.libId):null;return l&&l.group===g;});
        if(!exs.length)return;
        const gsets=exs.reduce((a,e)=>a+(parseInt(e.sets,10)||0),0);
        const est=estSessionMin(day),rs=realSessionStats(aid,day.id);
        const exTxt=exs.map(e=>esc(e.name)+' ('+e.sets+')').join(' · ');
        rows+='<tr><td><b>D'+(di+1)+'</b> <span class="tiny">'+esc(day.name)+'</span><div class="tiny" style="margin-top:2px;color:var(--tx2)">'+exTxt+'</div></td>'+
          '<td class="num" style="text-align:center"><b>'+gsets+'</b></td>'+
          '<td class="num" style="text-align:center" title="Duración estimada de la sesión completa (series × ejecución + descansos)">≈'+est+'′</td>'+
          '<td class="num" style="text-align:center" title="Duración real media (últimos registros)">'+(rs.dur?rs.dur+'′':'—')+'</td>'+
          '<td class="num" style="text-align:center" title="RPE medio reportado en esta sesión">'+(rs.rpe!=null?rs.rpe:'—')+'</td>'+
          '<td style="text-align:center"><span class="dcell"><button class="setpm" title="Quitar una serie de '+esc(g)+' aquí" data-act="apply-sets" data-aid="'+aid+'" data-day="'+day.id+'" data-group="'+esc(g)+'" data-d="-1">−</button><button class="setpm" title="Añadir la serie de '+esc(g)+' aquí" data-act="apply-sets" data-aid="'+aid+'" data-day="'+day.id+'" data-group="'+esc(g)+'" data-d="1">+</button></span></td></tr>';
      });
      if(!rows)rows='<tr><td colspan="6" class="tiny">Este grupo aún no tiene ejercicios en la rutina — añádelos en la pestaña Rutina.</td></tr>';
      const pr=PRIOS[p.priorities[g]];
      inner+='<div class="sect-h" style="margin:14px 0 8px"><h2 style="font-size:14px">'+esc(g)+'</h2><span class="badge '+(pr.cls||'')+'">'+pr.lbl+'</span><span class="tiny">'+cur+' series/sem'+(!dec||dec.k==='manten'?' · recomendado mantener':' → sugerido <b>'+sug+'</b>'+(dec.k==='reduce'?' (−10-20%)':''))+'</span></div>'+
        '<div class="tblwrap"><table class="tbl" style="min-width:560px"><thead><tr><th>Sesión y ejercicios del grupo</th><th style="width:60px">Series</th><th style="width:64px">Est.</th><th style="width:64px">Real</th><th style="width:56px">RPE</th><th style="width:88px">Aplicar</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    });
    inner+='<p class="tiny mt8">Coloca la serie extra en la sesión con menor duración y RPE (más margen de calidad); «+» se la suma al ejercicio del grupo con menos series ese día y queda registrado en los ajustes de la semana. Recuerda el tope de +4 series semanales y que con riesgo de lesión alto conviene mantener.</p>';
  }
  return '<div class="card mb16"><h3>Aplicar la decisión semanal <span class="hint">'+(dec?dec.lbl:'sin check-in esta semana')+' · en músculos primarios y máximos</span></h3>'+inner+'</div>';
}
Object.assign(ACTIONS,{
  'apply-sets':el=>{
    const aid=el.dataset.aid,g=el.dataset.group,delta=parseInt(el.dataset.d,10);
    const day=athData(aid).routine.days.find(x=>x.id===el.dataset.day);if(!day)return;
    const exs=day.exercises.filter(e=>{const l=e.libId?libById(e.libId):null;return l&&l.group===g;});
    if(!exs.length){toast('Añade primero un ejercicio de '+g+' en ese día');return;}
    let e2;
    if(delta>0){e2=exs.reduce((a,b)=>(parseInt(a.sets,10)||0)<=(parseInt(b.sets,10)||0)?a:b);}
    else{
      const cand=exs.filter(x=>(parseInt(x.sets,10)||0)>1);
      if(!cand.length){toast('Todos los ejercicios de '+g+' están en 1 serie; elimina alguno desde Rutina');return;}
      e2=cand.reduce((a,b)=>(parseInt(a.sets,10)||0)>=(parseInt(b.sets,10)||0)?a:b);
    }
    const oldS=parseInt(e2.sets,10)||0,newS=Math.max(1,oldS+delta);
    if(newS===oldS)return;
    e2.sets=newS;
    logChange(aid,'ajuste','Series '+oldS+'→'+newS+' (decisión semanal)',day.name,e2.name);
    saveState();render();
  }
});

/* ================= ACCESIBILIDAD (pase en tiempo de ejecución) ================= */
/* La UI se regenera con innerHTML; este módulo re-aplica accesibilidad tras cada render:
   1) asocia <label> con su control (for/id)  2) nombra botones de solo icono
   3) oculta SVG decorativos a lectores de pantalla  4) Escape cierra el modal */
let __a11yId=0,__a11yQueued=false;
const A11Y_ACT={'modal-close':'Cerrar','logout':'Cerrar sesión','export':'Exportar datos (respaldo JSON)','reset-ask':'Restablecer demo','nav':'Volver','wlog-delset':'Eliminar serie','ex-move':'Mover ejercicio','pitem-del':'Quitar alimento','login':'Entrar'};
function a11yLabels(root){
  root.querySelectorAll('label:not([for])').forEach(lab=>{
    if(lab.querySelector('input,select,textarea'))return; // ya envuelve al control
    let ctrl=null,el=lab.nextElementSibling;
    if(el){ ctrl=el.matches('input,select,textarea')?el:(el.querySelector?el.querySelector('input,select,textarea'):null); }
    if(!ctrl && lab.parentElement){ const c=lab.parentElement.querySelectorAll('input,select,textarea'); if(c.length===1)ctrl=c[0]; }
    if(ctrl){ if(!ctrl.id)ctrl.id='a11y-f'+(++__a11yId); lab.setAttribute('for',ctrl.id); }
  });
}
function a11yButtons(root){
  root.querySelectorAll('button:not([aria-label])').forEach(b=>{
    if(b.textContent.trim())return; // tiene texto visible → ya tiene nombre
    b.setAttribute('aria-label', b.getAttribute('title')||A11Y_ACT[b.dataset.act]||'Acción');
  });
}
function a11ySvg(root){ root.querySelectorAll('svg:not([aria-hidden])').forEach(s=>{ s.setAttribute('aria-hidden','true'); s.setAttribute('focusable','false'); }); }
function a11yPlaceholders(root){
  root.querySelectorAll('input[placeholder]:not([aria-label]),textarea[placeholder]:not([aria-label])').forEach(el=>{
    if(el.id && root.querySelector('label[for="'+(window.CSS&&CSS.escape?CSS.escape(el.id):el.id)+'"]'))return;
    if(el.closest('label'))return;
    const ph=el.getAttribute('placeholder');if(ph)el.setAttribute('aria-label',ph);
  });
}
function a11yEnhance(){ a11yLabels(document); a11yButtons(document); a11ySvg(document); a11yPlaceholders(document); }
function a11yQueue(){ if(__a11yQueued)return; __a11yQueued=true; requestAnimationFrame(()=>{__a11yQueued=false; a11yEnhance();}); }
(function(){
  const obs=new MutationObserver(a11yQueue);
  ['app','modal-root','toast-root'].forEach(id=>{ const el=document.getElementById(id); if(el)obs.observe(el,{childList:true,subtree:true}); });
  document.addEventListener('keydown',e=>{
    const ov=document.querySelector('#modal-root .overlay');if(!ov)return;
    if(e.key==='Escape'){closeModal();return;}
    if(e.key==='Tab'){
      const f=ov.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])');
      if(!f.length)return;const first=f[0],last=f[f.length-1];
      if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
      else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
    }
  });
  a11yQueue();
})();
